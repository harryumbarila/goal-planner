<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Goal Planner · Planea hoy. Llega mañana.</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext x='50%25' y='78%25' font-size='26' text-anchor='middle' fill='%232563eb'%3E%E2%9C%A6%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase-config.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
:root{
  --bg:#0c0c0f;
  --bg-glow:rgba(59,130,246,0.16);
  --surface:#141418;
  --surface-2:#1c1c22;
  --surface-3:#101014;
  --text:#e8e6e1;
  --muted:#6a6960;
  --muted-2:#9a9890;
  --border:rgba(255,255,255,0.08);
  --accent:#3b82f6;
  --accent-soft:rgba(59,130,246,0.12);
  --accent-border:rgba(59,130,246,0.32);
  --success:#22c55e;
  --warning:#f59e0b;
  --danger:#ef4444;
  --shadow:0 16px 40px rgba(0,0,0,0.22);
}
body[data-theme="light"]{
  --bg:#f3efe4;
  --bg-glow:rgba(59,130,246,0.10);
  --surface:#ffffff;
  --surface-2:#f8f5ee;
  --surface-3:#f2ede3;
  --text:#171717;
  --muted:#667085;
  --muted-2:#475467;
  --border:rgba(15,23,42,0.12);
  --accent:#2563eb;
  --accent-soft:rgba(37,99,235,0.10);
  --accent-border:rgba(37,99,235,0.24);
  --success:#16a34a;
  --warning:#d97706;
  --danger:#dc2626;
  --shadow:0 16px 28px rgba(15,23,42,0.08);
}
body{
  font-family:'DM Sans',system-ui,-apple-system,'Segoe UI',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  transition:background 0.25s,color 0.25s;
  position:relative;
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(circle at top left,var(--bg-glow),transparent 32%),
    radial-gradient(circle at bottom right,rgba(34,197,94,0.08),transparent 28%);
  opacity:1;
}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
input[type=range]{
  -webkit-appearance:none;
  appearance:none;
  width:100%;
  height:4px;
  border-radius:999px;
  outline:none;
  cursor:pointer;
  margin:9px 0 0;
  border:none;
  display:block;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;
  appearance:none;
  width:15px;
  height:15px;
  border-radius:50%;
  background:var(--accent);
  cursor:pointer;
  border:2px solid var(--surface);
  transition:transform 0.15s ease;
}
input[type=range]:hover::-webkit-slider-thumb{transform:scale(1.12)}
input[type=range]::-moz-range-thumb{
  width:15px;
  height:15px;
  border-radius:50%;
  background:var(--accent);
  cursor:pointer;
  border:2px solid var(--surface);
}
.container{
  width:100%;
  max-width:1400px;
  margin:0 auto;
  padding:28px 28px 36px;
  position:relative;
}
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:16px;
  margin-bottom:22px;
}
.toolbar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:flex-end;
}
.page-title{
  font-size:26px;
  font-weight:700;
  letter-spacing:-0.04em;
  line-height:1.1;
  margin:0 0 4px;
}
.brand-mark{
  color:var(--accent);
  font-size:17px;
  margin-right:5px;
  vertical-align:middle;
  display:inline-block;
  line-height:1;
  position:relative;
  top:-1px;
}
.brand-tagline{
  font-style:italic;
  font-size:13px;
  letter-spacing:0.01em;
}
.page-sub{
  font-size:14px;
  color:var(--muted);
  margin:0;
  line-height:1.55;
  max-width:760px;
}
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:18px;
  box-shadow:var(--shadow);
}
.button,
.ghost-button,
.goal-tab{
  font-family:'DM Sans',sans-serif;
  border-radius:12px;
  border:1px solid var(--border);
  cursor:pointer;
  transition:all 0.18s ease;
  display:inline-flex;
  align-items:center;
  gap:7px;
}
.icon-btn{
  background:transparent;
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--muted);
  cursor:pointer;
  padding:6px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  transition:all 0.18s ease;
  flex-shrink:0;
}
.icon-btn:hover{border-color:var(--danger);color:var(--danger)}
.version-pill{
  display:inline-flex;
  align-items:center;
  gap:5px;
  font-size:12px;
  font-weight:600;
  padding:5px 13px;
  border-radius:999px;
  border:1px solid var(--accent-border);
  background:var(--accent-soft);
  color:var(--accent);
  cursor:pointer;
  transition:all 0.18s ease;
  font-family:inherit;
  letter-spacing:0.01em;
  white-space:nowrap;
}
.version-pill:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.whats-new-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
  z-index:1000;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.whats-new-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  padding:28px 28px 24px;
  max-width:440px;
  width:100%;
  box-shadow:var(--shadow);
}
.button{
  background:var(--accent-soft);
  border-color:var(--accent-border);
  color:var(--accent);
  padding:10px 14px;
  font-size:13px;
  font-weight:600;
}
.button:hover{transform:translateY(-1px);background:rgba(59,130,246,0.16)}
.button:disabled{opacity:0.45;cursor:not-allowed;transform:none}
.ghost-button{
  background:var(--surface);
  color:var(--text);
  padding:10px 14px;
  font-size:13px;
  font-weight:600;
}
.ghost-button:hover{border-color:var(--accent-border);color:var(--accent)}
.hero-grid,
.setup-grid,
.progress-grid,
.metric-grid,
.whatif-grid,
.summary-grid,
.goal-management-grid{
  display:grid;
  gap:16px;
}
.hero-grid{
  grid-template-columns:minmax(0,1.45fr) minmax(280px,0.8fr);
  margin-bottom:20px;
}
.summary-grid{
  grid-template-columns:repeat(4,1fr);
  margin-bottom:20px;
}
.goal-management-grid{
  grid-template-columns:1fr;
  align-items:start;
  margin-bottom:22px;
}
.setup-grid{
  grid-template-columns:1fr 1fr;
  margin-bottom:22px;
}
.progress-grid{
  grid-template-columns:minmax(180px,200px) minmax(0,1fr);
  margin-bottom:22px;
}
.metric-grid{
  grid-template-columns:repeat(4,1fr);
}
.whatif-grid{
  grid-template-columns:repeat(3,1fr);
}
.section-title{
  font-size:12px;
  font-weight:700;
  color:var(--muted-2);
  text-transform:uppercase;
  letter-spacing:0.08em;
  margin:0 0 14px;
}
.field-label{
  font-size:11px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:0.08em;
  display:block;
  margin-bottom:6px;
}
.mono{font-family:'JetBrains Mono',monospace}
.muted{color:var(--muted)}
.pill-row,
.goal-tab-row,
.purpose-grid,
.goal-stack{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}
.chip{
  background:var(--surface-2);
  border:1px solid var(--border);
  color:var(--muted-2);
  border-radius:999px;
  padding:8px 12px;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
  transition:all 0.18s ease;
}
.chip.active{
  background:var(--accent-soft);
  border-color:var(--accent-border);
  color:var(--accent);
}
.chip:hover{border-color:var(--accent-border);color:var(--text)}
.goal-tab-row{margin-bottom:16px}
.goal-tab{
  background:var(--surface);
  padding:12px 14px;
  min-width:150px;
  text-align:left;
  color:var(--text);
}
.goal-tab.active{
  background:var(--accent-soft);
  border-color:var(--accent-border);
}
.goal-tab small{
  display:block;
  color:var(--muted);
  font-size:11px;
  margin-top:4px;
}
.goal-stack{
  flex-direction:column;
}
.goal-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:12px 14px;
  background:var(--surface-2);
  border:1px solid var(--border);
  border-radius:14px;
}
.goal-row-left{min-width:0}
.goal-row-title{
  font-size:14px;
  font-weight:600;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.goal-row-sub{
  font-size:12px;
  color:var(--muted);
  margin-top:4px;
}
.status-badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.06em;
  padding:7px 10px;
  border-radius:999px;
  border:1px solid transparent;
}
.status-green{background:rgba(34,197,94,0.10);color:var(--success);border-color:rgba(34,197,94,0.18)}
.status-amber{background:rgba(245,158,11,0.10);color:var(--warning);border-color:rgba(245,158,11,0.18)}
.status-red{background:rgba(239,68,68,0.10);color:var(--danger);border-color:rgba(239,68,68,0.18)}
.onboarding-card{
  max-width:860px;
  margin:28px auto 0;
  padding:28px;
}
.onboarding-title{
  font-size:32px;
  font-weight:700;
  line-height:1.05;
  letter-spacing:-0.04em;
  margin:0 0 10px;
}
.onboarding-sub{
  font-size:15px;
  color:var(--muted);
  line-height:1.6;
  margin:0 0 24px;
}
.purpose-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}
.purpose-card{
  border-radius:16px;
  border:1px solid var(--border);
  background:var(--surface-2);
  color:var(--text);
  padding:16px;
  cursor:pointer;
  transition:all 0.18s ease;
  text-align:left;
}
.purpose-card.active{
  border-color:var(--accent-border);
  background:var(--accent-soft);
}
.purpose-card-title{
  font-size:15px;
  font-weight:700;
  margin:0 0 6px;
}
.purpose-card-copy{
  font-size:13px;
  color:var(--muted);
  line-height:1.45;
  margin:0;
}
.hero-callout{
  display:flex;
  flex-direction:column;
  gap:14px;
  padding:22px;
}
.hero-callout strong{
  font-size:18px;
  letter-spacing:-0.02em;
}
.hero-points{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}
.hero-point{
  background:var(--surface-2);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
}
.hero-point-title{
  font-size:12px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:0.08em;
  margin-bottom:6px;
}
.hero-point-value{
  font-size:16px;
  font-weight:700;
}
.summary-tile{
  padding:18px;
}
.summary-label{
  font-size:11px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:0.08em;
  margin-bottom:6px;
}
.summary-value{
  font-family:'JetBrains Mono',monospace;
  font-size:22px;
  font-weight:600;
}
.summary-sub{
  font-size:12px;
  color:var(--muted);
  margin-top:4px;
  line-height:1.45;
}
.input-shell{
  background:var(--surface-2);
  border:1px solid var(--border);
  border-radius:12px;
  color:var(--text);
  font-family:'JetBrains Mono',monospace;
  font-size:15px;
  font-weight:500;
  padding:10px 12px;
  width:100%;
  text-align:right;
  outline:none;
  transition:border-color 0.18s ease;
}
.input-shell:focus,
.select-shell:focus{border-color:var(--accent-border)}
.select-shell{
  background:var(--surface-2);
  border:1px solid var(--border);
  border-radius:12px;
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  padding:10px 36px 10px 12px;
  width:100%;
  outline:none;
  appearance:none;
  -webkit-appearance:none;
  cursor:pointer;
  background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0l5 6 5-6z' fill='%23808a9d'/%3E%3C/svg%3E");
  background-repeat:no-repeat;
  background-position:right 12px center;
}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:8px 6px;border-bottom:1px solid var(--border);text-align:right}
th{
  color:var(--muted);
  font-weight:700;
  font-size:10.5px;
  text-transform:uppercase;
  letter-spacing:0.08em;
  white-space:nowrap;
}
th:first-child,td:first-child{text-align:left}
.disclaimer{
  padding:18px;
  font-size:12px;
  color:var(--muted);
  line-height:1.6;
}
.copy-pill{
  display:inline-flex;
  align-items:center;
  gap:8px;
  font-size:12px;
  color:var(--muted);
}
/* Prevent grid/flex children from overflowing their tracks */
.goal-management-grid > *,
.setup-grid > *,
.metric-grid > *,
.summary-grid > *,
.hero-grid > *,
.whatif-grid > *,
.breakdown-grid > *{min-width:0}
@media (max-width:980px){
  .hero-grid,
  .goal-management-grid,
  .setup-grid,
  .metric-grid,
  .summary-grid,
  .whatif-grid,
  .breakdown-grid{grid-template-columns:1fr}
  /* Keep ring + metrics side by side even on smaller screens */
  .progress-grid{grid-template-columns:auto 1fr}
  .purpose-grid{grid-template-columns:1fr}
  .hero-points{grid-template-columns:1fr}
}
@media (max-width:720px){
  .container{padding:18px 16px 28px}
  .topbar{flex-direction:column}
  .toolbar{justify-content:flex-start;gap:6px}
  .toolbar-secondary{display:none}
  .theme-toggle-text{display:none}
  .onboarding-card{padding:22px 18px}
  .onboarding-title{font-size:28px}
}
/* ─── Sidebar app shell ──────────────────────────────── */
#root{min-height:100svh}
.sidebar{transition:width 0.2s ease}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:999px}
@keyframes splashPulse{0%,100%{opacity:0.4;transform:scale(0.92)}50%{opacity:1;transform:scale(1)}}
@media(max-width:767px){.container{padding-bottom:80px}}
</style>
</head>
<body data-theme="light">
<div id="splash" style="position:fixed;inset:0;z-index:9999;display:grid;place-items:center;background:var(--bg)">
  <span style="color:var(--accent);font-size:36px;animation:splashPulse 1.1s ease-in-out infinite">✦</span>
</div>
<div id="root"></div>
<script type="text/babel">
const STORAGE_KEY = 'goal-planner-state-v4';
const MAX_GOALS = 5;
const MAX_YEARS = 30;
const CURRENT_YEAR = new Date().getFullYear();

const WHATS_NEW = {
  version: '✦ v1.5 — Seguimiento',
  items: [
    { title: 'Recordatorio mensual', desc: 'Al entrar al seguimiento te preguntamos si ya aportaste. Un clic y queda registrado.' },
    { title: 'Real vs. plan en tiempo real', desc: 'Ve exactamente cuánto llevas acumulado frente a lo que el plan dice que deberías tener hoy, con la diferencia en pesos.' },
    { title: 'Historial mes a mes', desc: 'Cada mes queda con su estado: Saldado, Parcial, Omitido o Pendiente. Siempre sabes qué pasó.' },
    { title: 'Registrar cualquier monto', desc: 'Aportaste más, menos o nada este mes — lo registras con un campo libre, chips rápidos (50% · 100% · 150%) y una nota opcional.' },
    { title: 'Re-planear cuando vas atrás', desc: 'Si el saldo real cae debajo del esperado, el app te ofrece cuatro opciones: subir el aporte, extender el plazo, bajar la meta, o solo ver sin cambiar nada.' },
    { title: 'Indicador de salud por meta', desc: 'Cada meta muestra En camino, Atrás un poco o Hay que ajustar según qué tan cerca estás del plan proyectado.' },
  ],
};

const PURPOSE_OPTIONS = [
  {
    value: 'downpayment',
    label: 'Cuota inicial',
    description: 'Armar una entrada para vivienda con una meta concreta y medible.',
    baseGoal: 160000000,
    expectedReturn: 8,
    currentVal: 20000000,
    defaultTitle: 'Entrada vivienda',
  },
  {
    value: 'retirement',
    label: 'Retiro',
    description: 'Construir patrimonio de largo plazo con un horizonte amplio.',
    baseGoal: 1000000000,
    expectedReturn: 10,
    currentVal: 40000000,
    defaultTitle: 'Retiro',
  },
  {
    value: 'vacation',
    label: 'Vacaciones',
    description: 'Reservar un monto alcanzable sin complicar el flujo mensual.',
    baseGoal: 20000000,
    expectedReturn: 6,
    currentVal: 2000000,
    defaultTitle: 'Vacaciones',
  },
  {
    value: 'emergency',
    label: 'Fondo de emergencia',
    description: 'Crear un colchon de liquidez con foco en consistencia.',
    baseGoal: 48000000,
    expectedReturn: 5,
    currentVal: 4000000,
    defaultTitle: 'Fondo emergencia',
  },
  {
    value: 'education',
    label: 'Educacion',
    description: 'Planear estudios propios o de la familia con plazo definido.',
    baseGoal: 120000000,
    expectedReturn: 7,
    currentVal: 8000000,
    defaultTitle: 'Educacion',
  },
  {
    value: 'custom',
    label: 'Otro',
    description: 'Empezar con una meta flexible y refinarla despues.',
    baseGoal: 60000000,
    expectedReturn: 8,
    currentVal: 0,
    defaultTitle: 'Meta personalizada',
  },
];

const PURPOSE_MAP = PURPOSE_OPTIONS.reduce((acc, option) => {
  acc[option.value] = option;
  return acc;
}, {});

// Auth-flow purpose IDs → index.html PURPOSE_MAP keys
const AUTH_PURPOSE_MAP = {
  cuota: 'downpayment', retiro: 'retirement', fondo: 'emergency',
  vacaciones: 'vacation', educacion: 'education', otro: 'custom',
};

// Purpose list for the multi-step onboarding (mirrors auth.html)
const AUTH_PURPOSES = [
  { id: 'cuota',      title: 'Cuota inicial',       sub: 'Apartamento o casa',  amount: 240_000_000, years: 6  },
  { id: 'retiro',     title: 'Retiro',               sub: 'Largo plazo',         amount: 800_000_000, years: 25 },
  { id: 'fondo',      title: 'Fondo de emergencia',  sub: '3–6 meses de gastos', amount: 30_000_000,  years: 2  },
  { id: 'vacaciones', title: 'Vacaciones',            sub: 'Viaje o experiencia', amount: 12_000_000,  years: 1  },
  { id: 'educacion',  title: 'Educación',             sub: 'Tuya o de los tuyos', amount: 80_000_000,  years: 5  },
  { id: 'otro',       title: 'Otra meta',             sub: 'Tú la describes',     amount: 50_000_000,  years: 3  },
];

const onbReferenceCopy = (id, amount) => {
  const m = amount / 1e6;
  if (id === 'cuota')      return `$${Math.round(m)}M ≈ cuota inicial 30% para apartamento de $${Math.round(m * 3.33)}M en Bogotá.`;
  if (id === 'retiro')     return `$${Math.round(m)}M cubre ~25 años de retiro con un retiro mensual de $${Math.round(m / 300).toLocaleString('es-CO')}K.`;
  if (id === 'fondo')      return `$${Math.round(m)}M ≈ ${Math.round(m / 5)} meses de gastos para una persona en Bogotá.`;
  if (id === 'vacaciones') return `$${Math.round(m)}M alcanza para un viaje de 2 semanas en Europa para dos.`;
  if (id === 'educacion')  return `$${Math.round(m)}M cubre ~${Math.round(m / 16)} semestres de pregrado en universidad privada.`;
  return `$${Math.round(m)}M es el objetivo que definiste — ajústalo cuando quieras.`;
};

const clamp = (value, min, max) => Math.min(max, Math.max(min, value));
const coerceNumber = (value, fallback) => {
  const parsed = Number(value);
  return Number.isFinite(parsed) ? parsed : fallback;
};
const roundMoney = (value) => Math.max(0, Math.round(value));
const generateId = () => (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => { const r = Math.random()*16|0; return (c==='x'?r:(r&0x3|0x8)).toString(16); });

const fmt = (n) => {
  if (!Number.isFinite(n)) return '--';
  if (Math.abs(n) >= 1e9) return '$' + (n / 1e9).toFixed(2) + 'MM';
  if (Math.abs(n) >= 1e6) return '$' + (n / 1e6).toFixed(1) + 'M';
  if (Math.abs(n) >= 1e3) return '$' + (n / 1e3).toFixed(0) + 'K';
  return '$' + Math.round(n).toLocaleString('es-CO');
};

const pct = (value) => {
  if (!Number.isFinite(value)) return '--';
  return (value * 100).toFixed(1) + '%';
};

const projectByYear = (principal, annualRate, years, monthlyContribution) => {
  const safeYears = Math.max(0, Math.round(years));
  const monthlyRate = Math.max(0, annualRate) / 12;
  const values = [Math.max(0, principal)];
  let balance = Math.max(0, principal);
  for (let year = 1; year <= safeYears; year++) {
    for (let month = 0; month < 12; month++) {
      balance = balance * (1 + monthlyRate) + Math.max(0, monthlyContribution);
    }
    values.push(balance);
  }
  return values;
};

const futureValue = (principal, annualRate, years, monthlyContribution) => {
  const values = projectByYear(principal, annualRate, years, monthlyContribution);
  return values[values.length - 1];
};

const requiredRate = (pv, fv, years) => {
  if (pv >= fv) return 0;
  if (pv <= 0 || years <= 0) return Infinity;
  return Math.pow(fv / pv, 1 / years) - 1;
};

const requiredMonthly = (pv, fv, rate, years) => {
  if (rate <= 0) { const need = fv - pv; return need > 0 ? need / (years * 12) : 0; }
  let projected = pv;
  for (let i = 0; i < years; i++) projected *= (1 + rate);
  const gap = fv - projected;
  if (gap <= 0) return 0;
  let fvAnnuity = 0;
  for (let i = 0; i < years; i++) fvAnnuity += Math.pow(1 + rate, i);
  return Math.max(0, (gap / fvAnnuity) / 12);
};

const requiredMonthlyContrib = (pv, fv, annualRate, years) => {
  if (pv >= fv) return 0;
  const months = Math.max(1, Math.round(years * 12));
  const monthlyRate = Math.max(0, annualRate) / 12;
  if (monthlyRate === 0) {
    return Math.max(0, (fv - pv) / months);
  }
  const growth = Math.pow(1 + monthlyRate, months);
  const projectedPrincipal = pv * growth;
  const gap = fv - projectedPrincipal;
  if (gap <= 0) return 0;
  const annuityFactor = (growth - 1) / monthlyRate;
  return Math.max(0, gap / annuityFactor);
};

const yearsToGoal = (pv, fv, annualRate, monthlyContribution) => {
  if (pv >= fv) return 0;
  const monthlyRate = Math.max(0, annualRate) / 12;
  let balance = Math.max(0, pv);
  for (let month = 1; month <= 1200; month++) {
    balance = balance * (1 + monthlyRate) + Math.max(0, monthlyContribution);
    if (balance >= fv) return Math.ceil(month / 12);
  }
  return Infinity;
};

const lumpSumNeeded = (fv, annualRate, years) => {
  if (years <= 0) return fv;
  const monthlyRate = Math.max(0, annualRate) / 12;
  const months = Math.round(years * 12);
  if (monthlyRate === 0) return fv;
  return fv / Math.pow(1 + monthlyRate, months);
};

const requiredRateWithContrib = (pv, monthlyContribution, fv, years) => {
  if (years <= 0) return Infinity;
  if (futureValue(pv, 0, years, monthlyContribution) >= fv) return 0;
  let lo = 0;
  let hi = 1;
  while (hi < 10 && futureValue(pv, hi, years, monthlyContribution) < fv) hi *= 2;
  if (hi >= 10 && futureValue(pv, hi, years, monthlyContribution) < fv) return Infinity;
  for (let i = 0; i < 60; i++) {
    const mid = (lo + hi) / 2;
    if (futureValue(pv, mid, years, monthlyContribution) >= fv) hi = mid;
    else lo = mid;
  }
  return hi;
};

const sanitizeGoal = (goal, index = 0) => {
  const purpose = PURPOSE_MAP[goal.goalPurpose] ? goal.goalPurpose : 'custom';
  const preset = PURPOSE_MAP[purpose];
  return {
    id: goal.id || generateId(),
    title: (goal.title || preset.defaultTitle || ('Meta ' + (index + 1))).slice(0, 48),
    goalPurpose: purpose,
    currentVal: Math.max(0, coerceNumber(goal.currentVal, preset.currentVal)),
    expectedReturn: clamp(coerceNumber(goal.expectedReturn, preset.expectedReturn), 0, 100),
    monthlyAdd: Math.max(0, coerceNumber(goal.monthlyAdd, 1200000)),
    goalAmount: Math.max(1000000, coerceNumber(goal.goalAmount, preset.baseGoal)),
    goalYears: clamp(Math.round(coerceNumber(goal.goalYears, 5)), 1, MAX_YEARS),
  };
};

const createGoal = (overrides = {}, index = 0) => sanitizeGoal({
  id: generateId(),
  title: 'Meta ' + (index + 1),
  goalPurpose: 'custom',
  currentVal: 0,
  expectedReturn: 8,
  monthlyAdd: 1200000,
  goalAmount: 60000000,
  goalYears: 5,
  ...overrides,
}, index);

const createGoalFromOnboarding = (draft) => {
  const purposeKey = AUTH_PURPOSE_MAP[draft.purposeId] || 'custom';
  const preset = PURPOSE_MAP[purposeKey] || PURPOSE_MAP.custom;
  const years = clamp(Math.round(coerceNumber(draft.years, 6)), 1, MAX_YEARS);
  const amount = Math.max(preset.baseGoal, coerceNumber(draft.amount, preset.baseGoal));
  const monthly = Math.max(0, Math.round(requiredMonthly(preset.currentVal, amount, preset.expectedReturn / 100, years)));
  return createGoal({
    title: preset.defaultTitle,
    goalPurpose: preset.value,
    currentVal: preset.currentVal,
    expectedReturn: preset.expectedReturn,
    monthlyAdd: monthly,
    goalAmount: amount,
    goalYears: years,
  }, 0);
};

const serializeGoal = (goal) => ({
  id: goal.id,
  title: goal.title,
  goalPurpose: goal.goalPurpose,
  currentVal: roundMoney(goal.currentVal),
  expectedReturn: Number(goal.expectedReturn.toFixed(2)),
  monthlyAdd: roundMoney(goal.monthlyAdd),
  goalAmount: roundMoney(goal.goalAmount),
  goalYears: goal.goalYears,
});

const sanitizeAppState = (state) => {
  const rawGoals = Array.isArray(state.goals) && state.goals.length ? state.goals : [createGoal({}, 0)];
  const goals = rawGoals.slice(0, MAX_GOALS).map((goal, index) => sanitizeGoal(goal, index));
  const activeGoalId = goals.some((goal) => goal.id === state.activeGoalId) ? state.activeGoalId : goals[0].id;
  return {
    theme: state.theme === 'dark' ? 'dark' : 'light',
    goals,
    activeGoalId,
    onboardingComplete: Boolean(state.onboardingComplete),
  };
};

const parseUrlState = () => {
  const params = new URLSearchParams(window.location.search);
  if (!params.toString()) return null;
  const theme = params.get('theme') === 'dark' ? 'dark' : 'light';
  const rawGoals = params.get('goals');
  if (rawGoals) {
    try {
      const goals = JSON.parse(rawGoals);
      return sanitizeAppState({
        theme,
        goals,
        activeGoalId: params.get('active'),
        onboardingComplete: true,
      });
    } catch (error) {
      console.warn('No se pudo leer estado compartido:', error);
    }
  }
  const singleGoal = params.get('goal');
  if (singleGoal) {
    const goal = createGoal({
      title: params.get('title') || (PURPOSE_MAP[params.get('purpose')] || PURPOSE_MAP.custom).defaultTitle,
      goalPurpose: params.get('purpose') || 'custom',
      currentVal: params.get('current'),
      expectedReturn: params.get('return'),
      monthlyAdd: params.get('monthly'),
      goalAmount: singleGoal,
      goalYears: params.get('years'),
    }, 0);
    return sanitizeAppState({
      theme,
      goals: [goal],
      activeGoalId: goal.id,
      onboardingComplete: true,
    });
  }
  return null;
};

const loadInitialState = () => {
  const fromUrl = parseUrlState();
  if (fromUrl) return fromUrl;
  try {
    const raw = window.localStorage.getItem(STORAGE_KEY);
    if (raw) return sanitizeAppState(JSON.parse(raw));
  } catch (error) {
    console.warn('No se pudo cargar localStorage:', error);
  }
  const starter = createGoal({}, 0);
  return {
    theme: 'light',
    goals: [starter],
    activeGoalId: starter.id,
    onboardingComplete: false,
  };
};

const syncUrlState = (state) => {
  if (!state.goals.length || !state.onboardingComplete) return;
  const activeGoal = state.goals.find((goal) => goal.id === state.activeGoalId) || state.goals[0];
  const params = new URLSearchParams();
  params.set('theme', state.theme);
  params.set('active', activeGoal.id);
  params.set('goal', String(roundMoney(activeGoal.goalAmount)));
  params.set('years', String(activeGoal.goalYears));
  params.set('monthly', String(roundMoney(activeGoal.monthlyAdd)));
  params.set('current', String(roundMoney(activeGoal.currentVal)));
  params.set('return', String(Number(activeGoal.expectedReturn.toFixed(2))));
  params.set('purpose', activeGoal.goalPurpose);
  params.set('title', activeGoal.title);
  params.set('goals', JSON.stringify(state.goals.map(serializeGoal)));
  const nextUrl = window.location.pathname + '?' + params.toString();
  window.history.replaceState({}, '', nextUrl);
};

const CurrencyInput = ({ value, onChange, ...rest }) => {
  const numVal = Number.isFinite(+value) ? Math.round(+value) : 0;
  const [display, setDisplay] = React.useState(
    () => numVal === 0 ? '' : numVal.toLocaleString('es-CO')
  );
  const inputRef = React.useRef(null);

  // Sync from external changes (e.g. slider) only when the field is not focused
  React.useEffect(() => {
    if (document.activeElement !== inputRef.current) {
      setDisplay(numVal === 0 ? '' : numVal.toLocaleString('es-CO'));
    }
  }, [numVal]);

  const handleChange = (e) => {
    const input = e.target;
    const cursorPos = input.selectionStart;
    // How many digits are to the left of the cursor?
    const digitsBeforeCursor = (input.value.slice(0, cursorPos).match(/\d/g) || []).length;
    const digits = input.value.replace(/\D/g, '');
    const numeric = digits === '' ? 0 : parseInt(digits, 10);
    const formatted = digits === '' ? '' : numeric.toLocaleString('es-CO');
    setDisplay(formatted);
    if (onChange) onChange({ target: { value: numeric } });
    // Restore cursor to the same logical digit position in the re-formatted string
    requestAnimationFrame(() => {
      if (inputRef.current && document.activeElement === inputRef.current) {
        let digitsSeen = 0;
        let newPos = formatted.length;
        for (let i = 0; i < formatted.length; i++) {
          if (/\d/.test(formatted[i])) {
            digitsSeen++;
            if (digitsSeen === digitsBeforeCursor) { newPos = i + 1; break; }
          }
        }
        inputRef.current.setSelectionRange(newPos, newPos);
      }
    });
  };

  const handleFocus = (e) => { setTimeout(() => e.target.select(), 0); };
  const handleBlur  = ()  => { setDisplay(numVal === 0 ? '' : numVal.toLocaleString('es-CO')); };

  return (
    <input
      ref={inputRef}
      type="text"
      inputMode="numeric"
      className="input-shell"
      value={display}
      onChange={handleChange}
      onFocus={handleFocus}
      onBlur={handleBlur}
      {...rest}
    />
  );
};

const NumberInput = ({ value, onChange, min, max, step, currency = false, ...rest }) => {

const SliderInput = ({ value, min, max, step, onChange }) => {
  const ratio = max === min ? 0 : ((value - min) / (max - min)) * 100;

      min={min}
      max={max}
      step={step}
      value={value}
      onChange={onChange}
      style={{ background: `linear-gradient(to right,var(--accent) ${clamp(ratio, 0, 100)}%,rgba(128,138,157,0.22) ${clamp(ratio, 0, 100)}%)` }}

};

      <NumberInput value={goal.goalYears} min={1} max={MAX_YEARS} step={1} onChange={(e) => onPatch({ goalYears: clamp(+e.target.value || 1, 1, MAX_YEARS) })} />
    </Field>
    <Field label={'\u00bfPara qu\u00e9 es esta meta?'}>
      <Select value={goal.goalPurpose} onChange={(e) => onPatch({ goalPurpose: e.target.value })}>
        {PURPOSE_OPTIONS.map((option) => (
          <option key={option.value} value={option.value}>{option.label}</option>
        ))}
      </Select>
    </Field>
  </Card>
);

const VerdictBanner = ({ goal, finalVal, eta, onPatch }) => {
  const state = statusFromProjection(finalVal, goal.goalAmount);
  const monthlyNeeded = requiredMonthlyContrib(goal.currentVal, goal.goalAmount, goal.expectedReturn / 100, goal.goalYears);
  const roundedNeeded = Number.isFinite(monthlyNeeded) ? Math.ceil(monthlyNeeded / 100000) * 100000 : null;
  const projectedPct = Math.round((finalVal / goal.goalAmount) * 100);
  const suggestedYears = clamp(Number.isFinite(eta) && eta > goal.goalYears ? eta : goal.goalYears + 3, 1, MAX_YEARS);
  const suggestedGoal = finalVal > 5000000 ? Math.max(5000000, Math.floor(finalVal / 5000000) * 5000000) : null;
  const toneClass = state === 'green' ? 'status-green' : state === 'amber' ? 'status-amber' : 'status-red';
  const badge = state === 'green' ? 'En camino' : state === 'amber' ? 'Cerca' : 'Ajustar plan';
  const headline = state === 'green'
    ? `Llegarias a ${fmt(finalVal)} en ${goal.goalYears} ${goal.goalYears === 1 ? 'a\u00f1o' : 'a\u00f1os'}`
    : state === 'amber'
      ? `Te faltaria ${fmt(goal.goalAmount - finalVal)} para cerrar la meta`
      : `Con este plan llegarias a ${projectedPct}% de la meta`;
  const copy = state === 'green'
    ? (goal.monthlyAdd > 0
        ? `Tus aportes de ${fmt(goal.monthlyAdd)}/mes sostienen el ritmo. Si sigues así, la meta se cumple sin cambiar el plazo.`
        : 'La meta se cumple con el capital actual y el rendimiento esperado.')
    : state === 'amber'
      ? `Para llegar en el mismo plazo, el plan necesita aproximadamente ${fmt(Math.round(monthlyNeeded))}/mes en total.`
      : `La meta está exigente para el plazo actual. Prueba extender el horizonte, subir el aporte o bajar el objetivo inicial.`;

  return (
    <Card style={{
      marginBottom: 22,
      background: state === 'green'
        ? 'linear-gradient(135deg,rgba(34,197,94,0.10),transparent)'
        : state === 'amber'
          ? 'linear-gradient(135deg,rgba(245,158,11,0.10),transparent)'
          : 'linear-gradient(135deg,rgba(239,68,68,0.10),transparent)',
    }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', gap: 16, alignItems: 'flex-start', flexWrap: 'wrap' }}>
        <div style={{ maxWidth: 760 }}>
          <span className={'status-badge ' + toneClass}>{badge}</span>
          <h3 style={{ fontSize: 19, margin: '12px 0 6px', letterSpacing: '-0.02em' }}>{headline}</h3>
          <p style={{ margin: 0, color: 'var(--muted)', fontSize: 13, lineHeight: 1.6 }}>{copy}</p>
        </div>
        <div className="copy-pill mono" style={{ color: 'var(--muted-2)' }}>
          {Number.isFinite(eta) ? `ETA ${CURRENT_YEAR + eta}` : 'Sin ETA clara'}
        </div>
      </div>
      {state !== 'green' ? (
        <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap', marginTop: 16 }}>
          {suggestedYears !== goal.goalYears ? <button className="button" onClick={() => onPatch({ goalYears: suggestedYears })}>{`Extender a ${suggestedYears} a\u00f1os`}</button> : null}
          {roundedNeeded && roundedNeeded !== goal.monthlyAdd ? <button className="button" onClick={() => onPatch({ monthlyAdd: roundedNeeded })}>{`Subir aporte a ${fmt(roundedNeeded)}/mes`}</button> : null}
          {suggestedGoal && suggestedGoal < goal.goalAmount ? <button className="button" onClick={() => onPatch({ goalAmount: suggestedGoal })}>{`Bajar meta a ${fmt(suggestedGoal)}`}</button> : null}
        </div>
      ) : null}
    </Card>
  );
};

const ProgressRing = ({ goal, finalVal }) => {
  const projPct = Math.min(100, Math.round((finalVal / goal.goalAmount) * 100));
  const currPct = Math.min(100, Math.round((goal.currentVal / goal.goalAmount) * 100));
  const projYear = CURRENT_YEAR + goal.goalYears;
  const outerR = 56;
  const outerC = 2 * Math.PI * outerR;
  const outerOffset = outerC - (projPct / 100) * outerC;
  const innerR = 40;
  const innerC = 2 * Math.PI * innerR;
  const innerOffset = innerC - (currPct / 100) * innerC;
  const outerColor = projPct >= 100 ? 'var(--success)' : projPct >= 70 ? 'var(--warning)' : 'var(--danger)';
  return (
    <Card padding={24} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
      <div style={{ position: 'relative', width: 140, height: 140 }}>
        <svg width="140" height="140" viewBox="0 0 140 140" style={{ transform: 'rotate(-90deg)' }}>
          <circle cx="70" cy="70" r={outerR} fill="none" stroke="var(--border)" strokeWidth="8" />
          <circle cx="70" cy="70" r={outerR} fill="none" stroke={outerColor} strokeWidth="8" strokeLinecap="round" strokeDasharray={outerC} strokeDashoffset={outerOffset} />
          <circle cx="70" cy="70" r={innerR} fill="none" stroke="var(--border)" strokeWidth="6" />
          <circle cx="70" cy="70" r={innerR} fill="none" stroke="var(--accent)" strokeWidth="6" strokeLinecap="round" strokeDasharray={innerC} strokeDashoffset={innerOffset} />
        </svg>
        <div style={{ position: 'absolute', inset: 0, display: 'grid', placeItems: 'center', textAlign: 'center' }}>
          <div>
            <div className="mono" style={{ fontSize: 24, color: outerColor, fontWeight: 700 }}>{projPct}%</div>
            <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 3 }}>{`en ${projYear}`}</div>
            <div style={{ fontSize: 11, color: 'var(--accent)', marginTop: 4 }}>{`${currPct}% hoy`}</div>
          </div>
        </div>
      </div>
      <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 12, textAlign: 'center', lineHeight: 1.6 }}>
        <div>{fmt(goal.currentVal) + ' hoy'}</div>
        <div><span style={{ color: outerColor }}>{fmt(finalVal)}</span>{' proyectado'}</div>
      </div>
    </Card>
  );
};

const MetricRow = ({ goal, finalVal }) => {
  const diff = finalVal - goal.goalAmount;
  const reqRate = requiredRate(goal.currentVal, goal.goalAmount, goal.goalYears);
  const reqMonthly = requiredMonthlyContrib(goal.currentVal, goal.goalAmount, 0.10, goal.goalYears);
  const lumpSum = lumpSumNeeded(goal.goalAmount, goal.expectedReturn / 100, goal.goalYears);
  return (
    <div className="metric-grid">
      <SummaryTile
        label={'Valor proyectado'}
        value={fmt(finalVal)}
        tone={diff >= 0 ? 'green' : 'red'}
        sub={diff >= 0 ? fmt(diff) + ' de sobra' : fmt(Math.abs(diff)) + ' de deficit'}
      />
      <SummaryTile
        label={'Rendimiento necesario'}
        value={reqRate >= 9 || !Number.isFinite(reqRate) ? 'Imposible' : pct(reqRate)}
        tone={reqRate <= 0.10 ? 'green' : reqRate <= 0.25 ? 'amber' : 'red'}
        sub={'Solo con el capital actual'}
      />
      <SummaryTile
        label={'Aporte mensual necesario'}
        value={reqMonthly > 200000000 ? 'Inviable' : fmt(Math.round(reqMonthly))}
        tone={reqMonthly <= 2000000 ? 'green' : reqMonthly <= 8000000 ? 'amber' : 'red'}
        sub={'Al 10% anual'}
      />
      <SummaryTile
        label={'Capital inicial equivalente'}
        value={fmt(Math.round(lumpSum))}
        tone={goal.currentVal >= lumpSum ? 'green' : goal.currentVal >= lumpSum * 0.5 ? 'amber' : 'red'}
        sub={'Deposito unico hoy'}
      />
    </div>
  );
};

const ScenarioModal = ({ scenario, goal, currentProjection, onApply, onClose }) => {
  React.useEffect(() => {
    document.body.style.overflow = 'hidden';
    return () => { document.body.style.overflow = ''; };
  }, []);
  const reaches = scenario.val >= goal.goalAmount;
  const improvement = scenario.val - currentProjection;
  const pctOfGoal = Math.round((scenario.val / goal.goalAmount) * 100);
  return (
    <div className="whats-new-overlay" onClick={onClose}>
      <div className="whats-new-card" style={{ maxWidth: 460 }} onClick={(e) => e.stopPropagation()}>

          </div>

            <div key={i} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '9px 12px', background: 'var(--surface-2)', borderRadius: 10, marginBottom: 6 }}>
              <span style={{ fontSize: 13, color: 'var(--muted)' }}>{c.label}</span>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 13, fontWeight: 600, fontFamily: "'JetBrains Mono', monospace" }}>
                <span style={{ color: 'var(--muted)', textDecoration: 'line-through', opacity: 0.7 }}>{c.from}</span>
                <span style={{ color: 'var(--muted)' }}>{'→'}</span>

            </div>

          borderRadius: 14, padding: '14px 16px', marginBottom: 22,
        }}>
          <div style={{ fontSize: 11, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 8 }}>{'Resultado proyectado'}</div>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 10, marginBottom: 6, flexWrap: 'wrap' }}>
            <span className="mono" style={{ fontSize: 26, fontWeight: 700, color: reaches ? 'var(--success)' : 'var(--warning)' }}>{fmt(scenario.val)}</span>
            <span style={{ fontSize: 13, color: 'var(--muted)' }}>{`vs ${fmt(Math.round(currentProjection))} plan actual`}</span>
          </div>
          <div style={{ fontSize: 13, fontWeight: 600, color: reaches ? 'var(--success)' : 'var(--warning)', marginBottom: improvement > 0 ? 4 : 0 }}>
            {reaches
              ? `✓ Llega a la meta de ${fmt(goal.goalAmount)}`
              : `${pctOfGoal}% de la meta · faltan ${fmt(Math.round(goal.goalAmount - scenario.val))}`}

const WhatIfGrid = ({ goal, onPatch }) => {
  const [pending, setPending] = React.useState(null);
  const rate = goal.expectedReturn / 100;
  const safeLongerYears = clamp(goal.goalYears + 3, 1, MAX_YEARS);
  const currentProjection = futureValue(goal.currentVal, rate, goal.goalYears, goal.monthlyAdd);

  const scenarios = [
    {
      label: 'Duplicar aportes',
      desc: `${fmt(goal.monthlyAdd * 2)}/mes`,
      explain: `Doblas el aporte mensual de ${fmt(goal.monthlyAdd)} a ${fmt(goal.monthlyAdd * 2)}. Más capital entrando cada mes amplifica el interés compuesto desde el primer período — el efecto acumulado es mayor de lo que parece.`,
      changes: [{ label: 'Aporte mensual', from: fmt(goal.monthlyAdd), to: fmt(goal.monthlyAdd * 2) }],
      val: futureValue(goal.currentVal, rate, goal.goalYears, goal.monthlyAdd * 2),
      apply: { monthlyAdd: goal.monthlyAdd * 2 },
    },
    {
      label: '+5 pp retorno',
      desc: pct((goal.expectedReturn + 5) / 100),
      explain: `Aumentas el retorno esperado de ${pct(goal.expectedReturn / 100)} a ${pct((goal.expectedReturn + 5) / 100)}. Implica moverse hacia activos con mayor riesgo — acciones, ETFs o fondos mixtos. El resultado sube, pero también la volatilidad del camino.`,
      changes: [{ label: 'Retorno anual', from: pct(goal.expectedReturn / 100), to: pct((goal.expectedReturn + 5) / 100) }],
      val: futureValue(goal.currentVal, (goal.expectedReturn + 5) / 100, goal.goalYears, goal.monthlyAdd),
      apply: { expectedReturn: clamp(goal.expectedReturn + 5, 0, 100) },
    },
    {
      label: '+3 años plazo',
      desc: `${safeLongerYears} años total`,
      explain: `Extiendes el horizonte de ${goal.goalYears} a ${safeLongerYears} años sin cambiar aportes ni retorno. El tiempo extra le da al interés compuesto tres años más para trabajar — y en las etapas finales es cuando más crece.`,
      changes: [{ label: 'Plazo', from: `${goal.goalYears} años`, to: `${safeLongerYears} años` }],
      val: futureValue(goal.currentVal, rate, safeLongerYears, goal.monthlyAdd),
      apply: { goalYears: safeLongerYears },
    },
    {
      label: 'Aporte de $2M',
      desc: 'Plan fijo de $2M/mes',
      explain: `Fijas el aporte mensual en ${fmt(2000000)} como referencia concreta. Útil para comparar tu plan actual contra un número redondo y ver qué tan lejos o cerca estás de esa cifra.`,
      changes: [{ label: 'Aporte mensual', from: fmt(goal.monthlyAdd), to: fmt(2000000) }],
      val: futureValue(goal.currentVal, rate, goal.goalYears, 2000000),
      apply: { monthlyAdd: 2000000 },
    },
    {
      label: 'Escenario 12%',
      desc: 'Rendimiento balanceado',
      explain: `Modela un retorno del 12% anual, consistente con portafolios balanceados de acciones y bonos en mercados emergentes. Es históricamente alcanzable en horizontes largos, pero sin garantías año a año.`,
      changes: [{ label: 'Retorno anual', from: pct(goal.expectedReturn / 100), to: '12%' }],
      val: futureValue(goal.currentVal, 0.12, goal.goalYears, goal.monthlyAdd),
      apply: { expectedReturn: 12 },
    },
    {
      label: 'Conservador',
      desc: '8% + $1.2M/mes',
      explain: `Plan de bajo riesgo: 8% anual (comparable a TES o CDT de largo plazo) con ${fmt(1200000)} de aporte mensual. Sirve como piso para saber cuánto generarías asumiendo lo mínimo — sin exposición a renta variable.`,
      changes: [
        { label: 'Retorno anual', from: pct(goal.expectedReturn / 100), to: '8%' },
        { label: 'Aporte mensual', from: fmt(goal.monthlyAdd), to: fmt(1200000) },
      ],
      val: futureValue(goal.currentVal, 0.08, goal.goalYears, 1200000),

      <Card>
        <SectionTitle>{'\u00bfQu\u00e9 necesitas para llegar?'}</SectionTitle>

            const reaches = scenario.val >= goal.goalAmount;
            const tone = reaches ? 'var(--success)' : 'var(--warning)';
            return (
              <div
                key={scenario.label}
                onClick={() => setPending(scenario)}
                style={{
                  background: 'var(--surface-2)',
                  border: '1px solid var(--border)',

                  padding: 16,

                <div style={{ fontSize: 12, color: 'var(--muted)', marginTop: 6, lineHeight: 1.5 }}>
                  {scenario.desc + ' · ' + (reaches ? 'Llega a la meta' : `${Math.round((scenario.val / goal.goalAmount) * 100)}% de la meta`)}
                </div>
              </div>
            );
          })}
        </div>
      </Card>
    </React.Fragment>
  );
};

const DELAY_OPTIONS = [1, 2, 3, 5];

const InflationAdjuster = ({ goal, finalVal }) => {
  const [inflation, setInflation] = React.useState(5);
  const years = goal.goalYears;
  const factor = Math.pow(1 + inflation / 100, years);

  const goalRealValue        = Math.round(goal.goalAmount / factor);
  const projectedRealValue   = Math.round(finalVal / factor);
  const inflationAdjGoal     = Math.round(goal.goalAmount * factor);
  const purchasingPowerLoss  = goal.goalAmount - goalRealValue;
  const lossPercent          = Math.round((purchasingPowerLoss / goal.goalAmount) * 100);

  return (
    <Card style={{ marginBottom: 22 }}>
      <SectionTitle>{'Inflación: el costo invisible'}</SectionTitle>
      <p style={{ fontSize: 13, color: 'var(--muted)', margin: '0 0 18px', lineHeight: 1.6 }}>
        {`Una meta de ${fmt(goal.goalAmount)} en ${years} ${years === 1 ? 'año' : 'años'} no es lo mismo que ${fmt(goal.goalAmount)} hoy. La inflación erosiona el poder de compra en silencio.`}
      </p>

      <div style={{ background:'var(--accent-soft)', border:'1px solid var(--accent-border)', borderRadius:14, padding:'14px 18px', marginBottom:20 }}>
        <label style={{ fontSize:11, color:'var(--accent)', textTransform:'uppercase', letterSpacing:'0.08em', fontWeight:600, display:'block', marginBottom:20 }}>{'Inflacion anual estimada'}</label>
        <div style={{ position:'relative', paddingTop:30 }}>
          {/* Floating thumb bubble */}
          <div style={{
            position:'absolute', top:0,
            left:`calc(${((inflation-1)/19)*100}% + ${(7.5 - ((inflation-1)/19)*100 * 0.15).toFixed(1)}px)`,
            transform:'translateX(-50%)',
            background:'var(--accent)', color:'#fff',
            fontSize:13, fontWeight:700, fontFamily:"'JetBrains Mono',monospace",
            padding:'3px 10px', borderRadius:8, whiteSpace:'nowrap',
            pointerEvents:'none',
            boxShadow:'0 2px 8px rgba(37,99,235,0.35)',
            transition:'left 0.08s',
          }}>{`${inflation}%`}</div>
          <input
            type="range" min={1} max={20} step={1} value={inflation}
            onChange={(e) => setInflation(+e.target.value)}
            style={{ background:`linear-gradient(to right,var(--accent) ${((inflation-1)/19)*100}%,rgba(128,138,157,0.22) ${((inflation-1)/19)*100}%)` }}
          />
        </div>
        <div style={{ fontSize:11, color:'var(--muted)', marginTop:8 }}>{'IPC Colombia historico ~5% · Pico 2022: 13%'}</div>
      </div>

      <div className="setup-grid" style={{ marginBottom: 14 }}>
        <div style={{ background: 'var(--surface-2)', border: '1px solid var(--border)', borderRadius: 14, padding: 16 }}>
          <div style={{ fontSize: 11, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 10 }}>
            {`Tu meta de ${fmt(goal.goalAmount)} en ${years} años...`}
          </div>
          <div style={{ fontSize: 13, color: 'var(--muted)', marginBottom: 8 }}>{'...en pesos de hoy vale:'}</div>
          <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 22, fontWeight: 700, color: 'var(--warning)' }}>{fmt(goalRealValue)}</div>
          <div style={{ fontSize: 12, color: 'var(--muted)', marginTop: 4 }}>{`La inflación se lleva ${fmt(purchasingPowerLoss)} (${lossPercent}%)`}</div>
        </div>
        <div style={{ background: 'var(--surface-2)', border: '1px solid var(--border)', borderRadius: 14, padding: 16 }}>
          <div style={{ fontSize: 11, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 10 }}>
            {'Para conservar el poder de compra...'}
          </div>
          <div style={{ fontSize: 13, color: 'var(--muted)', marginBottom: 8 }}>{'...tu meta real debería ser:'}</div>
          <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 22, fontWeight: 700, color: 'var(--accent)' }}>{fmt(inflationAdjGoal)}</div>
          <div style={{ fontSize: 12, color: 'var(--muted)', marginTop: 4 }}>{`${fmt(goal.goalAmount)} de hoy = ${fmt(inflationAdjGoal)} en ${years} años`}</div>

      </div>

      <div style={{ background: 'var(--surface-2)', border: '1px solid var(--border)', borderRadius: 14, padding: 16 }}>
        <div style={{ fontSize: 11, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 8 }}>{'Tu proyección en pesos de hoy'}</div>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 10, flexWrap: 'wrap' }}>
          <span style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 22, fontWeight: 700, color: projectedRealValue >= goalRealValue ? 'var(--success)' : 'var(--warning)' }}>
            {fmt(projectedRealValue)}
          </span>
          <span style={{ fontSize: 13, color: 'var(--muted)' }}>{`(nominal: ${fmt(Math.round(finalVal))})`}</span>

        <div style={{ fontSize: 12, color: 'var(--muted)', marginTop: 4, lineHeight: 1.5 }}>

        </div>
      </div>
    </Card>
  );
};

const CostOfWaiting = ({ goal, finalVal }) => {
  const [delayYears, setDelayYears] = React.useState(2);

  const rate = goal.expectedReturn / 100;
  const effectiveYears = Math.max(0, goal.goalYears - delayYears);
  const delayedVal = futureValue(goal.currentVal, rate, effectiveYears, goal.monthlyAdd);
  const valueLost = Math.max(0, finalVal - delayedVal);
  const extraMonthly = Math.max(0,
    requiredMonthlyContrib(goal.currentVal, finalVal, rate, effectiveYears) - goal.monthlyAdd
  );

  const lostPct = finalVal > 0 ? Math.round((valueLost / finalVal) * 100) : 0;

  return (
    <Card style={{ marginBottom: 22 }}>

const GrowthBreakdown = ({ goal, finalVal, theme }) => {
  const canvasRef = React.useRef(null);
  const chartRef = React.useRef(null);

  const years = goal.goalYears;
  const rate = goal.expectedReturn / 100;
  const projections = projectByYear(goal.currentVal, rate, years, goal.monthlyAdd);
  const contributions = Array.from({ length: years + 1 }, (_, i) =>
    Math.round(Math.max(0, goal.currentVal) + Math.max(0, goal.monthlyAdd) * 12 * i)
  );
  const returns = projections.map((proj, i) => Math.max(0, Math.round(proj) - contributions[i]));

  const totalContributed = contributions[years];
  const totalReturns = Math.max(0, Math.round(finalVal) - totalContributed);
  const multiplier = totalContributed > 0 ? (totalReturns / totalContributed).toFixed(1) : '0.0';

  React.useEffect(() => {
    if (!canvasRef.current || typeof Chart === 'undefined') return;
    const styles = getComputedStyle(document.body);
    const colors = {
      text:    styles.getPropertyValue('--muted').trim(),
      grid:    styles.getPropertyValue('--border').trim(),
      surface: styles.getPropertyValue('--surface').trim(),
      muted2:  styles.getPropertyValue('--muted-2').trim(),
    };
    const labels = Array.from({ length: years + 1 }, (_, i) => i === 0 ? 'Hoy' : String(CURRENT_YEAR + i));
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(canvasRef.current, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label: 'Capital aportado',        data: contributions, backgroundColor: 'rgba(59,130,246,0.65)', borderRadius: 4, borderSkipped: false },
          { label: 'Generado por el dinero',   data: returns,       backgroundColor: 'rgba(34,197,94,0.70)',  borderRadius: 4, borderSkipped: false },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: colors.surface,
            titleColor: styles.getPropertyValue('--text').trim(),
            bodyColor: colors.muted2,
            borderColor: colors.grid,
            borderWidth: 1,
            padding: 12,
            callbacks: { label: (ctx) => `${ctx.dataset.label}: ${fmt(ctx.parsed.y)}` },
          },
        },
        scales: {
          x: { stacked: true, grid: { color: colors.grid }, ticks: { color: colors.text } },
          y: { stacked: true, grid: { color: colors.grid }, ticks: { color: colors.text, callback: (v) => fmt(v) } },
        },
      },
    });
    return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
  }, [goal, theme]);

  return (
    <Card style={{ marginBottom: 22 }}>
      <SectionTitle>{'El dinero trabajando por ti'}</SectionTitle>
      <div className="breakdown-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 12, marginBottom: 20 }}>
        {[
          { label: 'Total aportado',          value: fmt(totalContributed), sub: 'Lo que pusiste de tu bolsillo',      color: 'var(--accent)' },
          { label: 'Generado por el dinero',  value: fmt(totalReturns),     sub: 'Lo que creció solo',                 color: 'var(--success)' },
          { label: 'Multiplicador',           value: `${multiplier}×`,      sub: `Por cada $1 tuyo el interés aportó $${multiplier}`, color: 'var(--text)' },
        ].map(({ label, value, sub, color }) => (
          <div key={label} style={{ background: 'var(--surface-2)', border: '1px solid var(--border)', borderRadius: 14, padding: 16 }}>
            <div style={{ fontSize: 11, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 6 }}>{label}</div>
            <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 20, fontWeight: 600, color }}>{value}</div>
            <div style={{ fontSize: 12, color: 'var(--muted)', marginTop: 4, lineHeight: 1.4 }}>{sub}</div>
          </div>
        ))}

      <div style={{ display: 'flex', gap: 16, marginBottom: 10, fontSize: 12, color: 'var(--muted)', flexWrap: 'wrap' }}>

const ProjectionChart = ({ goal, theme }) => {
  const canvasRef = React.useRef(null);
  const chartRef = React.useRef(null);
  const [sigma, setSigma] = React.useState(17);

  React.useEffect(() => {
    if (!canvasRef.current || typeof Chart === 'undefined') return;
    const styles = getComputedStyle(document.body);
    const colors = {
      text:    styles.getPropertyValue('--muted').trim(),
      grid:    styles.getPropertyValue('--border').trim(),
      green:   styles.getPropertyValue('--success').trim(),
      amber:   styles.getPropertyValue('--warning').trim(),
      blue:    styles.getPropertyValue('--accent').trim(),
      purple:  theme === 'light' ? '#7c3aed' : '#a78bfa',
      surface: styles.getPropertyValue('--surface').trim(),
    };

    const rate      = goal.expectedReturn / 100;
    const upperRate = rate + sigma / 100;
    const lowerRate = Math.max(0, rate - sigma / 100);

    const upperProj    = projectByYear(goal.currentVal, upperRate, goal.goalYears, goal.monthlyAdd);
    const lowerProj    = projectByYear(goal.currentVal, lowerRate, goal.goalYears, goal.monthlyAdd);
    const mainProj     = projectByYear(goal.currentVal, rate,      goal.goalYears, goal.monthlyAdd);
    const noContribProj= projectByYear(goal.currentVal, rate,      goal.goalYears, 0);
    const noReturnProj = projectByYear(goal.currentVal, 0,         goal.goalYears, goal.monthlyAdd);
    const goalLine     = Array(goal.goalYears + 1).fill(goal.goalAmount);
    const labels       = Array.from({ length: goal.goalYears + 1 }, (_, i) => i === 0 ? 'Hoy' : String(CURRENT_YEAR + i));

    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(canvasRef.current, {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: `Optimista (+${sigma}% vol.)`,
            data: upperProj.map(Math.round),
            borderColor: 'rgba(34,197,94,0.28)',
            backgroundColor: 'rgba(34,197,94,0.09)',
            fill: 1,
            borderWidth: 1,
            borderDash: [4, 3],
            pointRadius: 0,
            tension: 0.28,
          },
          {
            label: `Pesimista (-${sigma}% vol.)`,
            data: lowerProj.map(Math.round),
            borderColor: 'rgba(34,197,94,0.28)',
            backgroundColor: 'transparent',
            fill: false,
            borderWidth: 1,
            borderDash: [4, 3],
            pointRadius: 0,
            tension: 0.28,
          },
          {
            label: 'Tu proyección',
            data: mainProj.map(Math.round),
            borderColor: colors.green,
            backgroundColor: 'transparent',
            fill: false,
            borderWidth: 2.5,
            pointRadius: 3,
            pointBackgroundColor: colors.green,
            tension: 0.28,
          },
          {
            label: 'Meta',
            data: goalLine,
            borderColor: colors.amber,
            borderWidth: 2,
            borderDash: [8, 4],
            pointRadius: 0,
            fill: false,
          },
          {
            label: 'Solo aportes',
            data: noReturnProj.map(Math.round),
            borderColor: colors.blue,
            borderWidth: 1.6,
            borderDash: [4, 4],
            pointRadius: 0,
            tension: 0.28,
            fill: false,
          },
          {
            label: 'Sin aportes',
            data: noContribProj.map(Math.round),
            borderColor: colors.purple,
            borderWidth: 1.6,
            borderDash: [3, 5],
            pointRadius: 0,
            tension: 0.28,
            fill: false,
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: colors.surface,
            titleColor: styles.getPropertyValue('--text').trim(),
            bodyColor: styles.getPropertyValue('--muted-2').trim(),
            borderColor: colors.grid,
            borderWidth: 1,
            padding: 12,
            callbacks: { label: (ctx) => ctx.dataset.label + ': ' + fmt(ctx.parsed.y) },
          },
        },
        scales: {
          y: { grid: { color: colors.grid }, ticks: { color: colors.text, callback: (v) => fmt(v) } },
          x: { grid: { color: colors.grid }, ticks: { color: colors.text } },
        },
      },
    });
    return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
  }, [goal, theme, sigma]);

  return (
    <Card>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', flexWrap: 'wrap', gap: 12, marginBottom: 14 }}>
        <SectionTitle>{'Proyección hacia la meta'}</SectionTitle>
        <div style={{ display: 'flex', alignItems: 'center', gap: 7, flexWrap: 'wrap' }}>
          <span style={{ fontSize: 11, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.07em' }}>{'Volatilidad:'}</span>
          {SIGMA_PRESETS.map(({ label, sigma: s }) => (
            <button
              key={label}
              onClick={() => setSigma(s)}
              style={{
                fontFamily: "'DM Sans',sans-serif",
                fontSize: 12, fontWeight: 600,
                padding: '4px 10px', borderRadius: 999,
                border: `1px solid ${sigma === s ? 'var(--accent-border)' : 'var(--border)'}`,
                background: sigma === s ? 'var(--accent-soft)' : 'var(--surface-2)',
                color: sigma === s ? 'var(--accent)' : 'var(--muted-2)',
                cursor: 'pointer', transition: 'all 0.18s ease',

      <div style={{ position: 'relative', height: 320 }}>
        <canvas ref={canvasRef} />

const YearTable = ({ goal }) => {
  const rate = goal.expectedReturn / 100;
  const rows = projectByYear(goal.currentVal, rate, goal.goalYears, goal.monthlyAdd).map((val, index, arr) => {
    const pctGoal = Math.round((val / goal.goalAmount) * 100);
    const gain = index === 0 ? 0 : val - arr[index - 1];
    const contributed = goal.currentVal + goal.monthlyAdd * 12 * index;
    const remaining = Math.max(0, goal.goalAmount - val);
    return { index, val, pctGoal, gain, contributed, remaining };
  });
  return (
    <Card>
      <SectionTitle>{'Tabla año por año'}</SectionTitle>
      <div className="table-wrap">
        <table>
          <thead>
            <tr>
              <th>{'Ano'}</th>
              <th>{'Valor'}</th>
              <th>{'Ganancia'}</th>
              <th>{'Capital aportado'}</th>
              <th>{'% meta'}</th>
              <th>{'Falta'}</th>
            </tr>
          </thead>
          <tbody>
            {rows.map((row) => (
              <tr key={row.index}>
                <td>{row.index === 0 ? 'Hoy' : CURRENT_YEAR + row.index}</td>
                <td className="mono" style={{ color: 'var(--success)' }}>{fmt(row.val)}</td>
                <td className="mono">{row.index === 0 ? '-' : '+' + fmt(row.gain)}</td>
                <td className="mono">{fmt(row.contributed)}</td>
                <td className="mono" style={{ color: row.pctGoal >= 100 ? 'var(--success)' : row.pctGoal >= 70 ? 'var(--warning)' : 'var(--danger)' }}>{row.pctGoal + '%'}</td>
                <td className="mono">{row.remaining > 0 ? fmt(row.remaining) : 'Meta alcanzada'}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </Card>
  );
};

    </div>
    <div className="goal-stack">
      {goals.map((goal) => {
        const finalVal = futureValue(goal.currentVal, goal.expectedReturn / 100, goal.goalYears, goal.monthlyAdd);

const CombinedOverview = ({ goals }) => {
  const combinedRequired = goals.reduce((sum, goal) => sum + requiredMonthlyContrib(goal.currentVal, goal.goalAmount, goal.expectedReturn / 100, goal.goalYears), 0);
  const combinedPlanned = goals.reduce((sum, goal) => sum + goal.monthlyAdd, 0);
  const onTrackCount = goals.filter((goal) => futureValue(goal.currentVal, goal.expectedReturn / 100, goal.goalYears, goal.monthlyAdd) >= goal.goalAmount).length;
  const totalGoalAmount = goals.reduce((sum, goal) => sum + goal.goalAmount, 0);
  const monthlyGap = Math.max(0, combinedRequired - combinedPlanned);
  return (
    <div className="summary-grid">
      <SummaryTile label={'Metas activas'} value={String(goals.length)} sub={'Puedes manejar varias metas al mismo tiempo'} />
      <SummaryTile label={'Aporte combinado'} value={fmt(combinedPlanned)} sub={'Suma de los aportes definidos'} tone={'blue'} />
      <SummaryTile label={'Necesario total'} value={fmt(Math.round(combinedRequired))} sub={'Aporte agregado meta por meta'} tone={monthlyGap > 0 ? 'amber' : 'green'} />
      <SummaryTile label={'Capital objetivo'} value={fmt(totalGoalAmount)} sub={`${onTrackCount}/${goals.length} metas en camino`} tone={onTrackCount === goals.length ? 'green' : 'amber'} />
    </div>
  );
};

          ))}
        </div>
      </div>
      <Card padding={14} style={{ background: 'var(--surface-2)' }}>
        <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--muted)', marginBottom: 6 }}>{'Referencia'}</div>
        <p className="page-sub" style={{ lineHeight: 1.55 }}>{onbReferenceCopy(draft.purposeId, draft.amount)}</p>
      </Card>
      <div style={{ display: 'flex', gap: 10 }}>
        <button className="ghost-button" onClick={() => setStep(0)}>{'← Atrás'}</button>
        <button className="button" style={{ flex: 1 }} onClick={() => setStep(2)}>{'Siguiente →'}</button>
      </div>
    </div>
  );

  const Step3 = () => {
    const preset = PURPOSE_MAP[AUTH_PURPOSE_MAP[draft.purposeId] || 'custom'] || PURPOSE_MAP.custom;
    const monthly = Math.max(0, Math.round(requiredMonthly(preset.currentVal, draft.amount, preset.expectedReturn / 100, draft.years)));
    return (
      <div style={{ display: 'grid', gap: 18 }}>
        <div>
          <h2 className="onboarding-title" style={{ marginBottom: 6 }}>{'¿En cuánto tiempo?'}</h2>
          <p className="onboarding-sub">{'El plazo afecta cuánto debes aportar al mes.'}</p>
        </div>
        <Card padding={18} style={{ background: 'var(--surface-2)' }}>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--muted)', marginBottom: 6 }}>
            {`Plazo · ${draft.years} ${draft.years === 1 ? 'año' : 'años'}`}
          </div>
          <SliderInput value={draft.years} min={1} max={MAX_YEARS} step={1}
            onChange={(e) => setDraft((prev) => ({ ...prev, years: +e.target.value }))} />
        </Card>
        <Card padding={18} style={{ background: 'linear-gradient(135deg,var(--accent-soft),transparent)', border: '1px solid var(--accent-border)' }}>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--accent)', marginBottom: 6 }}>{'Tu plan propuesto'}</div>
          <div className="mono" style={{ fontSize: 22, fontWeight: 700, letterSpacing: '-0.02em', color: 'var(--accent)', marginBottom: 10 }}>
            {`${fmt(draft.amount)} en ${draft.years} ${draft.years === 1 ? 'año' : 'años'}`}
          </div>
          <OnbStatRow label="Aporte mensual" value={fmt(monthly)} accent />
          <OnbStatRow label="Rendimiento estimado" value={pct(preset.expectedReturn / 100)} />
          <OnbStatRow label="Capital inicial" value={fmt(preset.currentVal)} last />
        </Card>
        <div style={{ display: 'flex', gap: 10 }}>
          <button className="ghost-button" onClick={() => setStep(1)}>{'← Atrás'}</button>
          <button className="button" style={{ flex: 1 }} onClick={onStart}>{'Crear mi meta ✦'}</button>
        </div>
      </div>
    );
  };

  const steps = [<Step1 />, <Step2 />, <Step3 />];

  return (
    <Card className="onboarding-card" padding={28}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 4 }}>
        <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--muted)' }}>
          {`Paso ${step + 1} de 3`}
        </div>
        <StepDots total={3} current={step} />
      </div>
      {steps[step]}
    </Card>
  );
};

const userInitials = (user) => {
  const name = user?.user_metadata?.full_name || user?.email || '';
  if (!name) return '?';
  if (name.includes('@')) return name[0].toUpperCase();
  return name.split(' ').slice(0,2).map(p=>p[0]).join('').toUpperCase();
};

function useBreakpoint() {
  const get = () => { const w=window.innerWidth; return w<768?'mobile':w<1100?'tablet':'desktop'; };
  const [bp, setBp] = React.useState(get);
  React.useEffect(() => {
    const fn = () => setBp(get());
    window.addEventListener('resize', fn);
    return () => window.removeEventListener('resize', fn);
  }, []);
  return bp;
}
