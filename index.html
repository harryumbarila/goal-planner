function InlineTitle({ value, onSave, style = {} }) {
  const [editing, setEditing] = React.useState(false);
  const [draft, setDraft] = React.useState(value);
  const [hover, setHover] = React.useState(false);
  const inputRef = React.useRef(null);
  React.useEffect(() => { setDraft(value); }, [value]);
  React.useEffect(() => {
    if (editing && inputRef.current) { inputRef.current.focus(); inputRef.current.select(); }
  }, [editing]);
  const commit = () => {
    const trimmed = draft.trim().slice(0, 48);
    if (trimmed && trimmed !== value) onSave(trimmed);
    else setDraft(value);
    setEditing(false);
  };
  const cancel = () => { setDraft(value); setEditing(false); };
  if (editing) {
    return (
      <input ref={inputRef} value={draft}
        onChange={e => setDraft(e.target.value.slice(0, 48))}
        onBlur={commit}
        onKeyDown={e => { if (e.key === 'Enter') commit(); else if (e.key === 'Escape') cancel(); }}
        style={{ ...style, background:'var(--surface-2)', border:'1px solid var(--accent-border)',
          borderRadius:8, padding:'2px 8px', margin:'-3px -9px',
          outline:0, color:'var(--text)', minWidth:240, maxWidth:'100%',
          fontFamily:"'DM Sans', sans-serif" }} />
    );
  }
  return (
    <span onClick={() => setEditing(true)}
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      title="Click para renombrar"
      style={{ ...style, cursor:'pointer', borderRadius:8, padding:'2px 8px', margin:'-2px -8px',
        background: hover ? 'var(--surface-2)' : 'transparent',
        transition:'background 0.15s ease', display:'inline-block' }}>
      {value}
    </span>
  );
}

const ArchiveModal = ({ goal, contribCount, onClose, onConfirm, busy }) => (
  <div className="whats-new-overlay" onClick={busy ? undefined : onClose}>
    <div className="whats-new-card" style={{ maxWidth:440 }} onClick={(e) => e.stopPropagation()}>
      <div style={{ fontSize:11, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--muted)', marginBottom:6 }}>Archivar meta</div>
      <h3 style={{ fontSize:20, fontWeight:700, letterSpacing:'-0.02em', margin:'0 0 12px' }}>
        ¿Archivar <span style={{ color:'var(--accent)' }}>{goal.title}</span>?
      </h3>
      <p style={{ fontSize:13, color:'var(--muted-2)', lineHeight:1.55, margin:'0 0 18px' }}>
        Tus <strong style={{ color:'var(--text)' }}>{contribCount} aporte{contribCount===1?'':'s'} registrado{contribCount===1?'':'s'}</strong> se conservarán intactos pero quedarán ocultos del seguimiento mensual y de la lista de metas activas. Puedes restaurarla cuando quieras desde <strong style={{ color:'var(--text)' }}>Archivadas</strong>.
      </p>
      <div style={{ display:'flex', gap:10, justifyContent:'flex-end' }}>
        <button className="ghost-button" onClick={onClose} disabled={busy}>Cancelar</button>
        <button className="ghost-button" onClick={onConfirm} disabled={busy}
          style={{ background:'rgba(245,158,11,0.12)', borderColor:'rgba(245,158,11,0.36)', color:'var(--warning)' }}>
          {busy ? 'Archivando…' : 'Archivar'}
        </button>
      </div>
    </div>
  </div>
);

const WhatsNewModal = ({ onClose }) => (
  <div className="whats-new-overlay" onClick={onClose}>
    <div className="whats-new-card" onClick={(e) => e.stopPropagation()}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:22 }}>
        <div>
          <div style={{ fontSize:11, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:4 }}>{'Novedades'}</div>
          <div style={{ fontSize:22, fontWeight:700, letterSpacing:'-0.03em' }}>{WHATS_NEW.version}</div>
        </div>
        <button className="icon-btn" onClick={onClose} style={{ border:'none' }}><XIcon /></button>
      </div>
      <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
        {WHATS_NEW.items.map((item, i) => (
          <div key={i} style={{ display:'flex', gap:12, alignItems:'flex-start' }}>
            <div style={{ width:6, height:6, borderRadius:'50%', background:'var(--accent)', marginTop:6, flexShrink:0 }} />
            <div>
              <div style={{ fontSize:14, fontWeight:600, marginBottom:2 }}>{item.title}</div>
              <div style={{ fontSize:13, color:'var(--muted)', lineHeight:1.45 }}>{item.desc}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  </div>
);

function App() {
  const [appState, setAppState] = React.useState(loadInitialState);
  const [onboardingDraft, setOnboardingDraft] = React.useState(DEFAULT_ONBOARDING);
  const [shareStatus, setShareStatus] = React.useState('');
  const [showWhatsNew, setShowWhatsNew] = React.useState(false);
  const [user, setUser] = React.useState(null);  // null=loading, obj=authenticated

  // Sidebar + responsive (must precede all conditional returns)
  const bp = useBreakpoint();
  const isMobile = bp==='mobile', isTablet=bp==='tablet';
  const [sidebarCollapsed, setSidebarCollapsed] = React.useState(false);
  React.useEffect(() => { setSidebarCollapsed(isTablet); }, [isTablet]);
  const [moreOpen, setMoreOpen] = React.useState(false);
  const [archiveTarget, setArchiveTarget] = React.useState(null);
  const [archiveCount,  setArchiveCount]  = React.useState(0);
  const [archiveBusy,   setArchiveBusy]   = React.useState(false);

  // Auth guard: check session on boot, redirect to auth.html if not signed in
  React.useEffect(() => {
    const removeSplash = () => { const s = document.getElementById('splash'); if (s) s.remove(); };
    if (typeof db === 'undefined') { removeSplash(); return; } // supabase not loaded
    let sub;
    db.auth.getSession().then(({ data: { session } }) => {
      if (!session) { window.location.href = 'auth.html'; return; } // keep splash during redirect
      setUser(session.user);
      removeSplash();
    }).catch(() => removeSplash());
    const { data: { subscription } } = db.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_OUT') { window.location.href = 'auth.html'; return; }
      if (session) setUser(session.user);
    });
    sub = subscription;
    return () => { if (sub) sub.unsubscribe(); };
  }, []);

  // Fetch goals from Supabase once on user load. Supabase wins over localStorage.
  const goalsFetchedRef = React.useRef(false);
  React.useEffect(() => {
    if (!user || typeof db === 'undefined' || goalsFetchedRef.current) return;
    goalsFetchedRef.current = true;
    db.from('goals')
      .select('id,title,goal_purpose,current_val,monthly_add,goal_amount,expected_return,goal_years')
      .eq('user_id', user.id)
      .is('archived_at', null)
      .order('created_at', { ascending: true })
      .then(({ data, error }) => {
        if (error) { console.warn('[supabase] load goals failed:', error.message); return; }
        if (!data || data.length === 0) return; // new user — keep local state
        const goalsFromDb = data.map((g, i) => sanitizeGoal({
          id: g.id, title: g.title, goalPurpose: g.goal_purpose,
          currentVal: g.current_val, monthlyAdd: g.monthly_add,
          goalAmount: g.goal_amount, expectedReturn: g.expected_return,
          goalYears: g.goal_years,
        }, i));
        setAppState((prev) => {
          const activeId = prev.activeGoalId && goalsFromDb.find(g => g.id === prev.activeGoalId)
            ? prev.activeGoalId : goalsFromDb[0].id;
          return { ...prev, goals: goalsFromDb, activeGoalId: activeId, onboardingComplete: true };
        });
      });
  }, [user]);

  // Lock body scroll when any modal is open
  React.useEffect(() => {
    document.body.style.overflow = showWhatsNew ? 'hidden' : '';
    return () => { document.body.style.overflow = ''; };
  }, [showWhatsNew]);

    React.useEffect(() => {
    document.body.setAttribute('data-theme', appState.theme);
  }, [appState.theme]);

  React.useEffect(() => {
    try {
      window.localStorage.setItem(STORAGE_KEY, JSON.stringify({
        theme: appState.theme,
        goals: appState.goals.map(serializeGoal),
        activeGoalId: appState.activeGoalId,
        onboardingComplete: appState.onboardingComplete,
      }));
    } catch (error) {
      console.warn('No se pudo guardar localStorage:', error);
    }
    syncUrlState(appState);
    // Background sync to Supabase (debounced 2s, fire-and-forget)
    if (typeof db !== 'undefined' && user) {
      const t = window.setTimeout(async () => {
        try {
          const isUUID = (s) => /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(s);
          const goalsToSync = appState.goals.filter((g) => isUUID(g.id));
          if (!goalsToSync.length) return;
          await db.from('goals').upsert(
            goalsToSync.map((g) => ({
              id: g.id,
              user_id: user.id,
              title: g.title,
              goal_purpose: g.goalPurpose,
              current_val:  Math.round(g.currentVal),
              monthly_add:  Math.round(g.monthlyAdd),
              goal_amount:  Math.round(g.goalAmount),
              expected_return: g.expectedReturn,
              goal_years:   g.goalYears,
            })),
            { onConflict: 'id' }
          );
        } catch(e) { console.warn('[supabase] sync failed:', e.message); }
      }, 2000);
      return () => window.clearTimeout(t);
    }
  }, [appState, user]);

  const activeGoal = appState.goals.find((goal) => goal.id === appState.activeGoalId) || appState.goals[0];

  const patchGoal = (goalId, patch) => {
    setAppState((prev) => ({
      ...prev,
      goals: prev.goals.map((goal, index) => goal.id === goalId ? sanitizeGoal({ ...goal, ...patch }, index) : goal),
    }));
  };

  const addGoal = () => {
    setAppState((prev) => {
      if (prev.goals.length >= MAX_GOALS) return prev;
      const newGoal = createGoal({ title: 'Meta ' + (prev.goals.length + 1) }, prev.goals.length);
      return {
        ...prev,
        goals: [...prev.goals, newGoal],
        activeGoalId: newGoal.id,
        onboardingComplete: true,
      };
    });
  };

  const removeGoal = (goalId) => {
    setAppState((prev) => {
      if (prev.goals.length === 1) return prev;
      const remaining = prev.goals.filter((goal) => goal.id !== goalId);
      const nextActive = prev.activeGoalId === goalId ? remaining[0].id : prev.activeGoalId;
      return { ...prev, goals: remaining, activeGoalId: nextActive };
    });
  };

  const restartOnboarding = () => {
    setOnboardingDraft(DEFAULT_ONBOARDING);
    setAppState((prev) => ({ ...prev, onboardingComplete: false }));
  };

  const handleArchive = async (goal) => {
    setArchiveTarget(goal);
    setArchiveCount(0);
    try {
      const c = await countGoalContributions(goal.id);
      setArchiveCount(c);
    } catch(e) { setArchiveCount(0); }
  };
  const confirmArchive = async () => {
    if (!archiveTarget) return;
    setArchiveBusy(true);
    try {
      await archiveGoalRow(archiveTarget.id);
      setAppState((prev) => {
        const remaining = prev.goals.filter(g => g.id !== archiveTarget.id);
        const nextActive = prev.activeGoalId === archiveTarget.id
          ? (remaining[0]?.id || prev.activeGoalId)
          : prev.activeGoalId;
        return { ...prev, goals: remaining, activeGoalId: nextActive };
      });
      setArchiveTarget(null);
    } catch(e) { console.error('[archive]', e); }
    finally { setArchiveBusy(false); }
  };

  const toggleTheme = () => {
    setAppState((prev) => ({ ...prev, theme: prev.theme === 'dark' ? 'light' : 'dark' }));
  };
  const signOut = async () => {
    try { if (typeof db !== 'undefined') await db.auth.signOut(); } catch(e) {}
    window.location.href = 'auth.html';
  };


  // Mark onboarding complete in Supabase (idempotent, runs whenever user + flag are ready)
  React.useEffect(() => {
    if (!user || !appState.onboardingComplete || typeof db === 'undefined') return;
    db.from('profiles')
      .update({ onboarding_complete: true })
      .eq('id', user.id)
      .then(({ error }) => { if (error) console.warn('[supabase] mark onboarding failed:', error.message); });
  }, [user, appState.onboardingComplete]);

    const copyShareLink = async () => {
    try {
      await navigator.clipboard.writeText(window.location.href);
      setShareStatus('Link copiado');
      window.setTimeout(() => setShareStatus(''), 1800);
    } catch (error) {
      setShareStatus('Copialo desde la barra de direccion');
      window.setTimeout(() => setShareStatus(''), 2200);
    }
  };

  const startFromOnboarding = () => {
    const firstGoal = createGoalFromOnboarding(onboardingDraft);
    setAppState((prev) => ({
      ...prev,
      goals: [firstGoal],
      activeGoalId: firstGoal.id,
      onboardingComplete: true,
    }));
  };

  const hasGoals = appState.goals.length > 0;
  const canAddMore = appState.goals.length < MAX_GOALS;
  const goalsWithStatus = appState.goals.map(g => {
    const fv = futureValue(g.currentVal, g.expectedReturn/100, g.goalYears, g.monthlyAdd);
    return { id:g.id, title:g.title, tone:statusFromProjection(fv, g.goalAmount) };
  });
  const onSelectGoal = (goalId) => setAppState(prev => ({ ...prev, activeGoalId: goalId }));
  const shellProps = {
    isMobile, isTablet, sidebarCollapsed, onToggleCollapse:()=>setSidebarCollapsed(c=>!c),
    moreOpen, onMoreClose:()=>setMoreOpen(false), onMoreOpen:()=>setMoreOpen(true),
    appState, toggleTheme, user,
    onWhatsNew:()=>setShowWhatsNew(true), onShare:copyShareLink,
    shareStatus, onRestart:restartOnboarding, onSignOut:signOut,
    hasGoals, canAddMore, onAddGoal:addGoal,
    goals:goalsWithStatus, activeGoalId:appState.activeGoalId, onSelectGoal,
  };

  if (!appState.onboardingComplete) {
    return (
      <ShellLayout {...shellProps} title="Goal planner" subtitle="BIENVENIDO">
        {showWhatsNew && <WhatsNewModal onClose={() => setShowWhatsNew(false)} />}
        <OnboardingScreen draft={onboardingDraft} setDraft={setOnboardingDraft} onStart={startFromOnboarding} />
      </ShellLayout>
    );
  }

  const rate = activeGoal.expectedReturn / 100;
  const finalVal = futureValue(activeGoal.currentVal, rate, activeGoal.goalYears, activeGoal.monthlyAdd);
  const eta = yearsToGoal(activeGoal.currentVal, activeGoal.goalAmount, rate, activeGoal.monthlyAdd);
  const offTrack = finalVal < activeGoal.goalAmount;
  const reqMonthly = requiredMonthlyContrib(activeGoal.currentVal, activeGoal.goalAmount, rate, activeGoal.goalYears);
  const reqRateWithContrib = offTrack ? requiredRateWithContrib(activeGoal.currentVal, activeGoal.monthlyAdd, activeGoal.goalAmount, activeGoal.goalYears) : 0;
  const hints = {
    expectedReturn: offTrack && Number.isFinite(reqRateWithContrib) ? `Necesitas ${pct(reqRateWithContrib)} anual con tus aportes actuales` : null,
    monthlyAdd: offTrack && reqMonthly > 0 ? `Con ${fmt(Math.ceil(reqMonthly / 100000) * 100000)}/mes llegarias en este plazo` : null,
    goalYears: Number.isFinite(eta) ? `Con tu configuracion llegas en ${eta} ${eta === 1 ? 'año' : 'años'} (${CURRENT_YEAR + eta})` : 'Con esta configuracion la meta queda muy lejos',
  };

  return (
    <ShellLayout {...shellProps} title={activeGoal.title} subtitle="PLANNER">
      {showWhatsNew && <WhatsNewModal onClose={() => setShowWhatsNew(false)} />}
      {archiveTarget && (
        <ArchiveModal goal={archiveTarget} contribCount={archiveCount} busy={archiveBusy}
          onClose={() => !archiveBusy && setArchiveTarget(null)}
          onConfirm={confirmArchive} />
      )}

      <Card padding={22} style={{ background: 'linear-gradient(135deg,var(--surface),var(--surface-2))', marginBottom: 20 }}>
        <SectionTitle>{'Plan activo'}</SectionTitle>
        <div style={{ marginBottom: 18 }}>
          <div style={{ marginBottom: 6 }}>
            <InlineTitle value={activeGoal.title}
              onSave={(t) => patchGoal(activeGoal.id, { title: t })}
              style={{ fontSize: 26, fontWeight: 700, letterSpacing: '-0.04em' }} />
          </div>
          <div className="page-sub">{`${PURPOSE_MAP[activeGoal.goalPurpose].label} · ${fmt(activeGoal.goalAmount)} en ${activeGoal.goalYears} ${activeGoal.goalYears === 1 ? 'año' : 'años'}`}</div>
        </div>
        <div className="hero-points">
          <div className="hero-point">
            <div className="hero-point-title">{'Aporte actual'}</div>
            <div className="hero-point-value">{fmt(activeGoal.monthlyAdd) + '/mes'}</div>
          </div>
          <div className="hero-point">
            <div className="hero-point-title">{'Retorno esperado'}</div>
            <div className="hero-point-value">{pct(rate)}</div>
          </div>
          <div className="hero-point">
            <div className="hero-point-title">{'Valor proyectado'}</div>
            <div className="hero-point-value">{fmt(finalVal)}</div>
          </div>
          <div className="hero-point">
            <div className="hero-point-title">{'ETA estimada'}</div>
            <div className="hero-point-value">{Number.isFinite(eta) ? String(CURRENT_YEAR + eta) : 'Sin ETA'}</div>
          </div>
        </div>
      </Card>

      <CombinedOverview goals={appState.goals} />

      <div className="goal-management-grid">
        <GoalManager
          goals={appState.goals}
          activeGoalId={activeGoal.id}
          onSelect={(goalId) => setAppState((prev) => ({ ...prev, activeGoalId: goalId }))}
          onAddGoal={addGoal}
          onArchiveGoal={handleArchive}
        />
        <div>
          <div className="setup-grid">
            <StartingPointCard goal={activeGoal} onPatch={(patch) => patchGoal(activeGoal.id, patch)} hints={hints} />
            <GoalCard
              goal={activeGoal}
              onPatch={(patch) => patchGoal(activeGoal.id, patch)}
              hintGoalYears={hints.goalYears}
              canRemove={appState.goals.length > 1}
              onRemove={() => removeGoal(activeGoal.id)}
            />
          </div>

          <VerdictBanner goal={activeGoal} finalVal={finalVal} eta={eta} onPatch={(patch) => patchGoal(activeGoal.id, patch)} />

          <div className="progress-grid">
            <ProgressRing goal={activeGoal} finalVal={finalVal} />
            <MetricRow goal={activeGoal} finalVal={finalVal} />
          </div>

          <div style={{ marginBottom: 22 }}>
            <WhatIfGrid goal={activeGoal} onPatch={(patch) => patchGoal(activeGoal.id, patch)} />
          </div>

          <InflationAdjuster goal={activeGoal} finalVal={finalVal} />

          <CostOfWaiting goal={activeGoal} finalVal={finalVal} />

          <GrowthBreakdown goal={activeGoal} finalVal={finalVal} theme={appState.theme} />

          <div style={{ marginBottom: 22 }}>
            <ProjectionChart goal={activeGoal} theme={appState.theme} />
          </div>

          <div style={{ marginBottom: 22 }}>
            <YearTable goal={activeGoal} />
          </div>
        </div>
      </div>

      <Card className="disclaimer" padding={18}>
        <strong style={{ color: 'var(--muted-2)' }}>{'Disclaimer:'}</strong>{' '}
        {'Esta herramienta asume rendimientos compuestos mensuales y constantes, lo cual sigue siendo una simplificacion. Sirve para planificar, comparar escenarios y discutir prioridades, no como prediccion de mercado.'}
      </Card>

      <div style={{ textAlign: 'center', padding: '20px 0 6px', color: 'var(--muted)', fontSize: 12 }}>
        <div style={{ marginBottom: 5, fontSize: 13, fontWeight: 500, fontStyle: 'italic', color: 'var(--muted-2)' }}>{'Planea hoy. Llega mañana.'}</div>
        <span style={{ color: 'var(--accent)', marginRight: 5, fontSize: 11 }}>{'✦'}</span>
        {`© ${CURRENT_YEAR} Goal Planner · v1.5`}
      </div>
    </ShellLayout>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
