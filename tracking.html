   CONSTANTS

/* ═══════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════ */
const COP      = new Intl.NumberFormat('es-CO', { maximumFractionDigits: 0 });
const fmtCOP   = (n) => isFinite(n) ? '$ ' + COP.format(Math.round(n)) : '—';
const fmtAbbrev = (n) => {
  if (!isFinite(n)) return '—';
  const abs = Math.abs(n), sign = n < 0 ? '-' : '';
  if (abs >= 1e9) return sign + '$' + (abs/1e9).toFixed(1).replace(/\.0$/,'') + 'MM';
  if (abs >= 1e6) return sign + '$' + (abs/1e6).toFixed(1).replace(/\.0$/,'') + 'M';
  if (abs >= 1e3) return sign + '$' + (abs/1e3).toFixed(0) + 'K';
  return sign + '$' + COP.format(abs);
};

const currentMonthKey = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
};
const fmtMonthKey = (key) => {
  const [y,m] = key.split('-').map(Number);
  return new Date(y,m-1).toLocaleDateString('es-CO',{month:'short',year:'numeric'});
};
const buildMonthRows = (startDate, contributions) => {
  const [sy,sm] = startDate.split('-').map(Number);
  const now = new Date();
  const rows = [];
  let y=sy, m=sm;
  while (y < now.getFullYear() || (y===now.getFullYear() && m<=now.getMonth()+1)) {
    const key = `${y}-${String(m).padStart(2,'0')}`;
    const c   = contributions.find(x => x.month === key);
    rows.push({ key, month:fmtMonthKey(key), amount:c?c.amount:null, note:c?.note||'', dbId:c?.id||null });
    m++; if (m>12){m=1;y++;}
  }
  return rows.reverse();
};
const calcExpected = (startDate, startBalance, goal) => {
  const r = (goal.expected_return/100)/12;
  const [sy,sm] = startDate.split('-').map(Number);
  const now = new Date();
  const months = (now.getFullYear()-sy)*12+(now.getMonth()-(sm-1));
  let v = startBalance;
  for (let i=0;i<months;i++) v = v*(1+r)+goal.monthly_add;
  return Math.round(v);
};
const calcReal = (startBalance, contributions) =>
  startBalance + contributions.reduce((s,c)=>s+(c.amount||0),0);
const projectedValue = (goal) => {
  const r = (goal.expected_return/100)/12;
  const months = goal.goal_years * 12;
  let v = goal.current_val;
  for (let i=0; i<months; i++) v = v*(1+r) + goal.monthly_add;
  return Math.round(v);
};
const statusFromProjection = (fv, target) => {
  if (fv >= target) return 'green';
  if (fv >= target * 0.7) return 'amber';
  return 'red';
};

const userInitials = (user) => {
  const name = user?.user_metadata?.full_name || user?.email || '';
  if (!name) return '?';
  if (name.includes('@')) return name[0].toUpperCase();
  return name.split(' ').slice(0,2).map(p=>p[0]).join('').toUpperCase();
};

/* ═══════════════════════════════════════════════════
   SUPABASE
═══════════════════════════════════════════════════ */
const loadGoals = async (userId) => {
  const { data, error } = await db.from('goals')
    .select('id,title,goal_purpose,current_val,monthly_add,goal_amount,expected_return,goal_years,tracking_start_date,tracking_start_balance')
    .eq('user_id', userId).is('archived_at', null)
    .order('created_at', { ascending: true });
  if (error) throw error;
  return data || [];
};
const loadArchivedGoals = async (userId) => {
  const { data, error } = await db.from('goals')
    .select('id,title,goal_purpose,current_val,monthly_add,goal_amount,expected_return,goal_years,archived_at')
    .eq('user_id', userId).not('archived_at', 'is', null)
    .order('archived_at', { ascending: false });
  if (error) throw error;
  return data || [];
};
const archiveGoal = async (goalId) => {
  const { error } = await db.from('goals').update({ archived_at: new Date().toISOString() }).eq('id', goalId);
  if (error) throw error;
};
const unarchiveGoal = async (goalId) => {
  const { error } = await db.from('goals').update({ archived_at: null }).eq('id', goalId);
  if (error) throw error;
};
const countContributions = async (goalId) => {
  const { count, error } = await db.from('contributions').select('*', { count:'exact', head:true }).eq('goal_id', goalId);
  if (error) return 0;
  return count || 0;
};
const loadContributions = async (goalId) => {
  const { data, error } = await db.from('contributions')
    .select('id,month,amount,note').eq('goal_id', goalId)
    .order('month', { ascending: false });
  if (error) throw error;
  return data || [];
};
const upsertContribution = async (userId, goalId, month, amount, note, existingId) => {
  const row = { user_id:userId, goal_id:goalId, month, amount, note,
    updated_at: new Date().toISOString(), ...(existingId?{id:existingId}:{}) };
  const { data, error } = await db.from('contributions')
    .upsert(row, { onConflict:'goal_id,month' }).select('id').single();
  if (error) throw error;
  return data.id;
};
const updateGoalTitle = async (goalId, title) => {
  const { error } = await db.from('goals').update({ title }).eq('id', goalId);
  if (error) throw error;
};
const initTrackingStart = async (goalId, startDate, startBalance) => {
  const { error } = await db.from('goals')
    .update({ tracking_start_date:startDate, tracking_start_balance:startBalance }).eq('id', goalId);
  if (error) console.warn('[supabase] initTracking:', error.message);
};

/* ═══════════════════════════════════════════════════
   PRIMITIVES
═══════════════════════════════════════════════════ */
const css = (v) => `var(${v})`;
const Label = ({ children, style }) => (
  <div style={{ fontSize:11, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', color:css('--muted'), ...style }}>{children}</div>
);
const Card = ({ children, padding=20, hero=false, style }) => (
  <div style={{
    background:hero?`linear-gradient(135deg,${css('--surface')},${css('--surface-2')})`:css('--surface'),
    border:`1px solid ${css('--border')}`, borderRadius:18, padding, boxShadow:css('--shadow'), ...style,
  }}>{children}</div>

const Mono = ({ children, size=14, weight=500, color, style }) => (
  <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:size, fontWeight:weight,
    letterSpacing:size>=20?'-0.02em':0, color:color||css('--text'), ...style }}>{children}</span>
);
const Field = ({ label, children }) => (
  <div style={{ display:'grid', gap:8, marginBottom:14 }}>
    <Label>{label}</Label>{children}
  </div>
);
const Button = ({ kind='primary', onClick, disabled, children, style }) => {
  const base = { fontFamily:"'DM Sans',sans-serif", fontSize:12, fontWeight:600, borderRadius:12, padding:'10px 14px',
    cursor:disabled?'default':'pointer', transition:'all 0.18s ease', opacity:disabled?0.45:1, border:'none', ...style };
  return kind==='ghost'
    ? <button onClick={onClick} disabled={disabled} style={{ ...base, background:css('--surface'), border:`1px solid ${css('--border')}`, color:css('--text') }}>{children}</button>
    : <button onClick={onClick} disabled={disabled} style={{ ...base, background:css('--accent-soft'), border:`1px solid ${css('--accent-border')}`, color:css('--accent') }}>{children}</button>;
};
const Chip = ({ active, onClick, children }) => (
  <button onClick={onClick} style={{
    background:active?css('--accent-soft'):css('--surface-2'), border:`1px solid ${active?css('--accent-border'):css('--border')}`,
    color:active?css('--accent'):css('--text'), borderRadius:999, padding:'8px 12px',
    fontFamily:"'DM Sans',sans-serif", fontSize:12, fontWeight:600, cursor:'pointer', transition:'all 0.18s ease',
  }}>{children}</button>
);
const CurrencyInput = ({ value, onChange, ariaLabel }) => {
  const ref = React.useRef(null);
  const [focus, setFocus] = React.useState(false);
  const display = '$ ' + COP.format(Math.max(0, Math.round(value||0)));
  const handleChange = (e) => {
    const raw = e.target.value.replace(/[^\d]/g,'');
    const num = raw===''?0:parseInt(raw,10);
    const caret = e.target.selectionStart||0;
    const dl = e.target.value.slice(0,caret).replace(/[^\d]/g,'').length;
    onChange(num);
    requestAnimationFrame(() => {
      if (!ref.current) return;
      const next = ref.current.value;
      let pos=0, seen=0;
      while (pos<next.length && seen<dl){ if(/\d/.test(next[pos]))seen++; pos++; }
      ref.current.setSelectionRange(pos,pos);
    });
  };
  return (
    <input ref={ref} type="text" inputMode="numeric" aria-label={ariaLabel} value={display} onChange={handleChange}
      onFocus={()=>setFocus(true)} onBlur={()=>setFocus(false)}
      style={{ background:css('--surface-2'), border:`1px solid ${focus?css('--accent-border'):css('--border')}`,
        borderRadius:12, padding:'10px 12px', width:'100%', textAlign:'right',
        fontFamily:"'JetBrains Mono',monospace", fontSize:14, fontWeight:500, color:css('--text'), outline:0,
        transition:'border-color 0.18s ease' }} />
  );
};

/* ═══════════════════════════════════════════════════
   HEALTH PILL

/* ═══════════════════════════════════════════════════
   APP SHELL — BREAKPOINT
═══════════════════════════════════════════════════ */
function useBreakpoint() {
  const get = () => {
    const w = window.innerWidth;
    if (w < 768) return 'mobile';
    if (w < 1100) return 'tablet';
    return 'desktop';
  };
  const [bp, setBp] = React.useState(get);
  React.useEffect(() => {
    const fn = () => setBp(get());
    window.addEventListener('resize', fn);
    return () => window.removeEventListener('resize', fn);
  }, []);
  return bp;
}

/* ═══════════════════════════════════════════════════
   SIDEBAR ITEM
═══════════════════════════════════════════════════ */
function SidebarItem({ icon, label, active, muted, collapsed, badge, onClick }) {
  const [hover, setHover] = React.useState(false);
  const bg = active ? css('--text') : hover ? css('--surface-2') : 'transparent';
  const fg = active ? css('--surface') : muted ? css('--muted') : css('--text');
  return (
    <button onClick={onClick}
      onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}
      title={collapsed ? label : undefined}
      style={{
        display:'flex', alignItems:'center', gap:12,
        padding:collapsed?'9px 0':'9px 12px',
        justifyContent:collapsed?'center':'flex-start',
        background:bg, color:fg, border:'none', borderRadius:10,
        cursor:'pointer', textAlign:'left',
        fontFamily:"'DM Sans',sans-serif", fontSize:13, fontWeight:active?600:500,
        width:'100%', transition:'background 0.15s ease, color 0.15s ease',
        position:'relative',
      }}>
      <span style={{ fontSize:15, width:18, display:'inline-grid', placeItems:'center', flexShrink:0 }}>{icon}</span>
      {!collapsed && <span style={{ flex:1, whiteSpace:'nowrap' }}>{label}</span>}
      {!collapsed && badge && (
        <span style={{ background:css('--accent-soft'), color:css('--accent'), fontSize:10, fontWeight:700,
          padding:'1px 7px', borderRadius:999, border:`1px solid ${css('--accent-border')}` }}>{badge}</span>
      )}
      {collapsed && badge && (
        <span style={{ position:'absolute', top:4, right:6, width:7, height:7, borderRadius:999, background:css('--accent') }} />
      )}
    </button>
  );
}

function SidebarSubItem({ label, tone, active, onClick }) {
  const [hover, setHover] = React.useState(false);
  const toneColor = tone==='green'?css('--success'):tone==='amber'?css('--warning'):tone==='red'?css('--danger'):css('--muted');
  return (
    <button onClick={onClick}
      onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}
      style={{ display:'flex', alignItems:'center', gap:8,
        padding:'6px 12px 6px 30px',
        background:active?css('--accent-soft'):hover?css('--surface-2'):'transparent',
        color:active?css('--accent'):css('--text'),
        border:'none', borderRadius:8, cursor:'pointer', textAlign:'left',
        fontFamily:"'DM Sans',sans-serif", fontSize:12, fontWeight:active?600:500,
        width:'100%', transition:'background 0.15s ease, color 0.15s ease' }}>
      <span style={{ width:6, height:6, borderRadius:'50%', background:toneColor, flexShrink:0 }} />
      <span style={{ flex:1, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{label}</span>
    </button>
  );
}

function SidebarGroup({ title, collapsed, children }) {
  return (
    <div style={{ marginTop:14 }}>
      {!collapsed && <div style={{ fontSize:10, fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase',
        color:css('--muted'), padding:'0 12px 6px' }}>{title}</div>}
      {collapsed && <div style={{ height:1, background:css('--border'), margin:'8px' }} />}
      <div style={{ display:'grid', gap:2 }}>{children}</div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════════════ */

  const initials = userInitials(user);

  const displayName = user?.user_metadata?.full_name?.split(' ')[0] || email.split('@')[0] || 'Usuario';

  return (
    <aside className="sidebar" style={{
      width:collapsed?64:232, flexShrink:0,

          <a href="index.html" aria-label="Goal Planner" style={{ textDecoration:'none', color:css('--accent'), fontSize:20 }}>✦</a>
        )}
        {!collapsed && (

            background:'transparent', border:`1px solid ${css('--border')}`,
            color:css('--muted-2'), width:24, height:24, borderRadius:7,
            cursor:'pointer', fontSize:11, lineHeight:1, padding:0,

        <SidebarGroup title="Vistas" collapsed={collapsed}>
          <SidebarItem icon="◐" label="Planner" active={active==='plan'} collapsed={collapsed} onClick={()=>window.location.href='index.html'} />
          <SidebarItem icon="⌁" label="Seguimiento" active={active==='seg'} collapsed={collapsed} onClick={()=>onNav('seg')} />

const GoalHeader = ({ goal, contributions, tone, onArchive, canArchive, onRename }) => {
  const startDate    = goal.tracking_start_date;
  const startBalance = goal.tracking_start_balance || 0;
  const realBal  = calcReal(startBalance, contributions);
  const expBal   = calcExpected(startDate, startBalance, goal);
  const realPct  = Math.min(100,(realBal/goal.goal_amount)*100);
  const expPct   = Math.min(100,(expBal/goal.goal_amount)*100);
  const gap      = realBal - expBal;
  const toneColor = { green:css('--success'), amber:css('--warning'), red:css('--danger') }[tone];
  const toneCopy  = { green:'En camino', amber:'Atrás un poco', red:'Hay que ajustar' }[tone];
  const startLabel = (() => {
    const [y,m] = startDate.split('-').map(Number);
    return new Date(y,m-1).toLocaleDateString('es-CO',{month:'short',year:'numeric'});
  })();
  return (
    <Card padding={22} hero>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:16, gap:12 }}>
        <div style={{ minWidth:0 }}>
          <Label style={{ marginBottom:6 }}>{goal.goal_purpose} · desde {startLabel}</Label>
          <InlineTitle value={goal.title} onSave={(t) => onRename(goal.id, t)}
            style={{ fontSize:22, fontWeight:700, letterSpacing:'-0.03em', lineHeight:1.2 }} />
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:8, flexShrink:0 }}>
          <HealthPill tone={tone}>{toneCopy}</HealthPill>
          {canArchive && (
            <button onClick={onArchive} title="Archivar meta" style={{
              background:'transparent', border:`1px solid ${css('--border')}`,
              color:css('--muted-2'), width:30, height:30, borderRadius:8, cursor:'pointer',
              padding:0, display:'inline-flex', alignItems:'center', justifyContent:'center',
              transition:'all 0.18s ease',
            }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
                <rect x="2" y="4" width="20" height="5" rx="1"/>
                <path d="M4 9v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9"/>
                <line x1="10" y1="13" x2="14" y2="13"/>
              </svg>
            </button>
          )}
        </div>
      </div>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:8 }}>
        <Mono size={20} weight={600}>{fmtCOP(realBal)}</Mono>
        <Mono size={12} color={css('--muted-2')}>de {fmtCOP(goal.goal_amount)} · {realPct.toFixed(0)}%</Mono>
      </div>
      <div style={{ height:10, background:css('--surface-2'), border:`1px solid ${css('--border')}`,
        borderRadius:999, position:'relative', overflow:'hidden', marginBottom:8 }}>
        <div style={{ position:'absolute', left:0, top:0, bottom:0, width:`${realPct}%`, background:toneColor, transition:'width .3s ease' }} />
        {Math.abs(expPct-realPct)>0.5 && (
          <div style={{ position:'absolute', left:`${Math.min(expPct,99)}%`, top:-2, bottom:-2, width:2, background:css('--text'), opacity:0.4 }} />
        )}
      </div>
      <div style={{ display:'flex', justifyContent:'space-between', fontSize:11, color:css('--muted-2') }}>
        <span>Plan a hoy: {fmtCOP(expBal)} ({expPct.toFixed(0)}%)</span>
        <span style={{ color:toneColor, fontWeight:600 }}>
          {gap>=0?`+${fmtAbbrev(gap)} adelante`:`${fmtAbbrev(gap)} atrás`}
        </span>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:8, marginTop:16 }}>
        {[{ label:'Meta', value:fmtCOP(goal.goal_amount) },
          { label:'Aporte planeado', value:fmtCOP(goal.monthly_add)+'/mes' },
          { label:'Plazo', value:`${goal.goal_years} años` }
        ].map(t => (
          <div key={t.label} style={{ background:css('--surface-2'), border:`1px solid ${css('--border')}`, borderRadius:12, padding:'10px 12px' }}>
            <Label style={{ marginBottom:4 }}>{t.label}</Label>
            <Mono size={13} weight={600}>{t.value}</Mono>
          </div>
        ))}
      </div>
    </Card>
  );
};

/* ═══════════════════════════════════════════════════
   MONTHLY TRACKER
═══════════════════════════════════════════════════ */
const MonthlyTracker = ({ goal, contributions, onLog, onMarkPaid }) => {
  const monthKey  = currentMonthKey();
  const contrib   = contributions.find(c=>c.month===monthKey);
  const logged    = contrib?.amount||0;
  const target    = goal.monthly_add;
  const pct       = target>0?Math.min(100,(logged/target)*100):0;
  const remaining = Math.max(0,target-logged);
  const monthName = new Date().toLocaleDateString('es-CO',{month:'long',year:'numeric'});
  const tone      = pct>=100?css('--success'):pct>=60?css('--accent'):css('--warning');
  return (
    <Card padding={18} style={{ background:`linear-gradient(135deg,${css('--surface')},${css('--surface-2')})`, borderColor:css('--accent-border') }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:10 }}>
        <Label>Este mes · {monthName}</Label>
        <Mono size={11} color={css('--muted-2')}>{Math.round(pct)}%</Mono>
      </div>
      <div style={{ display:'flex', alignItems:'baseline', gap:8, marginBottom:10 }}>
        <Mono size={22} weight={600}>{fmtCOP(logged)}</Mono>
        <span style={{ color:css('--muted-2'), fontSize:13 }}>/ {fmtCOP(target)}</span>
      </div>
      <div style={{ height:6, background:css('--surface-2'), border:`1px solid ${css('--border')}`, borderRadius:999, overflow:'hidden', marginBottom:14 }}>
        <div style={{ width:`${pct}%`, height:'100%', background:tone, transition:'width .3s ease' }} />
      </div>
      {pct>=100
        ? <p style={{ fontSize:12, color:css('--success'), margin:'0 0 12px' }}>✓ Aporte de este mes completo.</p>
        : <p style={{ fontSize:12, color:css('--muted'), margin:'0 0 12px' }}>
            {remaining>0?<>Faltan <strong style={{ color:css('--text') }}>{fmtCOP(remaining)}</strong> para completar el aporte planeado.</>
              :'Aún no has registrado el aporte de este mes.'}
          </p>
      }
      <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
        <button onClick={onLog} style={{ flex:2, minWidth:130, background:css('--accent'), border:'none', color:'#fff',
          fontFamily:"'DM Sans',sans-serif", fontSize:13, fontWeight:600, borderRadius:12, padding:'10px 14px', cursor:'pointer' }}>
          {contrib?'✎ Editar aporte':'+ Registrar aporte'}
        </button>
        {!contrib && <Button kind="ghost" onClick={onMarkPaid}>Saldé el planeado</Button>}
      </div>
    </Card>
  );
};

function InlineTitle({ value, onSave, style = {} }) {
  const [editing, setEditing] = React.useState(false);
  const [draft, setDraft] = React.useState(value);
  const [hover, setHover] = React.useState(false);
  const inputRef = React.useRef(null);
  React.useEffect(() => { setDraft(value); }, [value]);
  React.useEffect(() => {
    if (editing && inputRef.current) { inputRef.current.focus(); inputRef.current.select(); }
  }, [editing]);
  const commit = () => {
    const trimmed = draft.trim().slice(0, 48);
    if (trimmed && trimmed !== value) onSave(trimmed);
    else setDraft(value);
    setEditing(false);
  };
  const cancel = () => { setDraft(value); setEditing(false); };
  if (editing) {
    return (
      <input ref={inputRef} value={draft}
        onChange={e => setDraft(e.target.value.slice(0, 48))}
        onBlur={commit}
        onKeyDown={e => { if (e.key === 'Enter') commit(); else if (e.key === 'Escape') cancel(); }}
        style={{ ...style, background:css('--surface-2'), border:`1px solid ${css('--accent-border')}`,
          borderRadius:8, padding:'2px 8px', margin:'-3px -9px',
          outline:0, color:css('--text'), minWidth:200, maxWidth:'100%',
          fontFamily:"'DM Sans', sans-serif" }} />
    );
  }
  return (
    <span onClick={() => setEditing(true)}
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      title="Click para renombrar"
      style={{ ...style, cursor:'pointer', borderRadius:8, padding:'2px 8px', margin:'-2px -8px',
        background: hover ? css('--surface-2') : 'transparent',
        transition:'background 0.15s ease', display:'inline-block' }}>
      {value}
    </span>
  );
}

const ReplanModal = ({ goal, contributions, onClose, onApply }) => {
  const startBalance = goal.tracking_start_balance||0;
  const realBal = calcReal(startBalance, contributions);
  const expBal  = calcExpected(goal.tracking_start_date, startBalance, goal);
  const gap     = realBal-expBal, absGap=Math.abs(gap);
  const newMonthly   = Math.round(goal.monthly_add*(1+(absGap/(goal.goal_amount*0.4))));
  const monthlyDelta = newMonthly-goal.monthly_add;
  const extraMonths  = Math.round((absGap/goal.monthly_add)*1.4);
  const newGoal      = Math.round(goal.goal_amount-absGap*0.85);
  const options = [
    { id:'monthly', tag:'Subir aporte',   delta:`+${fmtCOP(monthlyDelta)}/mes`, detail:`Mantienes la meta y la fecha. El aporte sube a ${fmtCOP(newMonthly)} al mes.` },
    { id:'extend',  tag:'Extender plazo', delta:`+${extraMonths} meses`,        detail:`Mantienes el aporte. Llegas en ${goal.goal_years*12+extraMonths} meses (en lugar de ${goal.goal_years*12}).` },
    { id:'lower',   tag:'Bajar meta',     delta:fmtCOP(newGoal-goal.goal_amount), detail:`Mantienes aporte y fecha. Meta nueva: ${fmtCOP(newGoal)}.` },
    { id:'none',    tag:'Solo ver',       delta:'sin cambios', detail:'No cambias nada. Revisas después y decides con calma.' },
  ];
  const [selected, setSelected] = React.useState('monthly');
  React.useEffect(()=>{ document.body.style.overflow='hidden'; return()=>{ document.body.style.overflow=''; }; },[]);
  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(15,18,25,0.55)', display:'grid', placeItems:'center',
      padding:20, zIndex:100, backdropFilter:'blur(6px)' }} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{ background:css('--surface'), border:`1px solid ${css('--border')}`,
        borderRadius:18, padding:26, width:'100%', maxWidth:560,
        boxShadow:'0 24px 60px rgba(0,0,0,0.25)', maxHeight:'90vh', overflowY:'auto' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:6 }}>
          <Label>Re-planear · {goal.title}</Label>
          <button onClick={onClose} style={{ background:'transparent', border:`1px solid ${css('--border')}`,
            borderRadius:10, width:30, height:30, color:css('--muted-2'), cursor:'pointer' }}>✕</button>
        </div>
        <h2 style={{ fontSize:22, fontWeight:700, letterSpacing:'-0.03em', margin:'6px 0 8px', color:gap<0?css('--warning'):css('--success') }}>
          {gap<0?`Vas ${fmtAbbrev(absGap)} atrás del plan`:`Vas ${fmtAbbrev(absGap)} adelantado`}
        </h2>
        <p style={{ fontSize:13, color:css('--muted'), margin:'0 0 18px', lineHeight:1.5 }}>
          Tu saldo real ({fmtCOP(realBal)}) está {gap<0?'por debajo':'por encima'} del proyectado para hoy ({fmtCOP(expBal)}). ¿Cómo quieres ajustar?
        </p>
        <div style={{ display:'grid', gap:8, marginBottom:18 }}>
          {options.map(opt=>{
            const active=selected===opt.id;
            return (
              <button key={opt.id} onClick={()=>setSelected(opt.id)} style={{
                background:active?css('--accent-soft'):css('--surface-2'),
                border:`${active?2:1}px solid ${active?css('--accent-border'):css('--border')}`,
                borderRadius:14, padding:'12px 14px', cursor:'pointer', textAlign:'left',
                display:'flex', alignItems:'center', gap:12, transition:'all .18s ease' }}>
                <div style={{ width:18, height:18, borderRadius:999, flexShrink:0,
                  border:`2px solid ${active?css('--accent'):css('--muted-2')}`, position:'relative' }}>
                  {active&&<div style={{ position:'absolute', inset:3, borderRadius:999, background:css('--accent') }}/>}
                </div>
                <div style={{ flex:1 }}>
                  <div style={{ display:'flex', justifyContent:'space-between', gap:8 }}>
                    <span style={{ fontSize:14, fontWeight:700, color:active?css('--accent'):css('--text') }}>{opt.tag}</span>
                    <Mono size={11} color={css('--muted-2')}>{opt.delta}</Mono>
                  </div>
                  <div style={{ fontSize:12, color:css('--muted'), marginTop:3, lineHeight:1.5 }}>{opt.detail}</div>
                </div>
              </button>
            );
          })}
        </div>
        <div style={{ display:'flex', gap:8 }}>
          <Button kind="ghost" onClick={onClose}>Cancelar</Button>
          <button onClick={()=>onApply(selected)} style={{ flex:2, background:css('--accent'), border:'none', color:'#fff',
            fontFamily:"'DM Sans',sans-serif", fontSize:13, fontWeight:600, borderRadius:12, padding:'10px 14px', cursor:'pointer' }}>
            Aplicar plan ✦
          </button>
        </div>
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════════════
   APP ROOT
═══════════════════════════════════════════════════ */
function App() {
  const bp = useBreakpoint();
  const isMobile = bp==='mobile', isTablet=bp==='tablet';

  const [theme, setTheme] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem(APP_STORAGE_KEY)||'{}').theme||'light'; } catch { return 'light'; }
  });
  React.useEffect(()=>{ document.body.setAttribute('data-theme',theme); },[theme]);
  const toggleTheme = () => setTheme(t=>t==='dark'?'light':'dark');

  // Sidebar state
  const [sidebarCollapsed, setSidebarCollapsed] = React.useState(false);
  React.useEffect(()=>{ setSidebarCollapsed(isTablet); },[isTablet]);

  // View / nav
  const [view, setView] = React.useState(() => {
    const v = new URLSearchParams(location.search).get('view');
    return (v==='arch'||v==='hist') ? v : 'seg';
  });
  const [moreOpen, setMoreOpen] = React.useState(false);
  const [showWhatsNew, setShowWhatsNew] = React.useState(false);
  const handleNav = (v) => {
    if (v==='more'){setMoreOpen(true);return;}
    if (v==='news'){setShowWhatsNew(true);return;}
    setView(v);
  };

  // Auth
  const [user, setUser] = React.useState(null);
  const [phase, setPhase] = React.useState('auth');
  const [errorMsg, setErrorMsg] = React.useState('');
  React.useEffect(()=>{
    db.auth.getSession().then(({ data:{ session } })=>{
      if (!session){ window.location.href='auth.html'; return; }
      setUser(session.user);
    });
    const { data:{ subscription } } = db.auth.onAuthStateChange((event,session)=>{
      if (event==='SIGNED_OUT'){ window.location.href='auth.html'; return; }
      if (session) setUser(session.user);
    });
    return ()=>subscription.unsubscribe();
  },[]);

  // Goals
  const [goals, setGoals] = React.useState([]);
  const [activeGoalId, setActiveGoalId] = React.useState(null);
  const fetchGoals = React.useCallback(async (uid) => {
    setPhase('loading');
    try {
      const data = await loadGoals(uid);
      setGoals(data);
      if (data.length>0) setActiveGoalId(id=>id&&data.find(g=>g.id===id)?id:data[0].id);
      setPhase('ready');
    } catch(e) {
      setErrorMsg('No se pudieron cargar las metas. Verifica tu conexión.');
      setPhase('error');
    }
  },[]);
  React.useEffect(()=>{ if (user) fetchGoals(user.id); },[user]);

  // Contributions
  const [contributions, setContributions] = React.useState([]);
  React.useEffect(()=>{
    if (!activeGoalId) return;
    const goal = goals.find(g=>g.id===activeGoalId);
    if (!goal) return;
    loadContributions(activeGoalId)
      .then(data=>{
        setContributions(data);
        // While there are no logged contributions, keep the tracking baseline
        // synced with the planner so the two views never disagree. Once the
        // first contribution is logged, the baseline freezes as a historical anchor.
        if (data.length === 0) {
          const startDate = currentMonthKey(), startBalance = goal.current_val || 0;
          if (goal.tracking_start_balance !== startBalance || goal.tracking_start_date !== startDate) {
            initTrackingStart(goal.id, startDate, startBalance);
            setGoals(prev=>prev.map(g=>g.id===goal.id?{...g,tracking_start_date:startDate,tracking_start_balance:startBalance}:g));
          }
        } else if (!goal.tracking_start_date) {
          const startDate = currentMonthKey(), startBalance = goal.current_val || 0;
          initTrackingStart(goal.id, startDate, startBalance);
          setGoals(prev=>prev.map(g=>g.id===goal.id?{...g,tracking_start_date:startDate,tracking_start_balance:startBalance}:g));
        }
      })
      .catch(e=>console.warn('[supabase] contributions:',e.message));
  },[activeGoalId, goals.length]);

  // Derived
  const goal = goals.find(g=>g.id===activeGoalId);
  const startBalance = goal?.tracking_start_balance||0;
  const tone = React.useMemo(()=>{
    if (!goal?.tracking_start_date) return 'amber';
    const real=calcReal(startBalance,contributions);
    const exp=calcExpected(goal.tracking_start_date,startBalance,goal);
    if (real>=exp) return 'green';
    if (real>=exp*0.85) return 'amber';
    return 'red';
  },[goal,startBalance,contributions]);
  const gap = goal?.tracking_start_date
    ? calcReal(startBalance,contributions)-calcExpected(goal.tracking_start_date,startBalance,goal)
    : 0;

  // Modals / UI
  const [showLog,      setShowLog]      = React.useState(false);
  const [showReplan,   setShowReplan]   = React.useState(false);
  const [showReminder, setShowReminder] = React.useState(true);
  const [saving,       setSaving]       = React.useState(false);
  const [toast,        setToast]        = React.useState(null);
  const [archiveTarget,setArchiveTarget]= React.useState(null);
  const [archiveCount, setArchiveCount] = React.useState(0);
  const [archiveBusy,  setArchiveBusy]  = React.useState(false);
  const [archivedGoals,setArchivedGoals]= React.useState([]);
  const [archivedLoaded,setArchivedLoaded]= React.useState(false);
  const showToast = (msg)=>{ setToast(msg); setTimeout(()=>setToast(null),3500); };

  const handleArchive = async (g) => {
    setArchiveTarget(g);
    setArchiveCount(0);
    const c = await countContributions(g.id);
    setArchiveCount(c);
  };

  React.useEffect(() => {
    if (view==='arch' && user && !archivedLoaded) {
      loadArchivedGoals(user.id)
        .then(data => { setArchivedGoals(data); setArchivedLoaded(true); })
        .catch(e => console.warn('[supabase] archived:', e.message));
    }
  }, [view, user, archivedLoaded]);

  const handleRename = async (goalId, title) => {
    const prevGoals = goals;
    setGoals(g => g.map(x => x.id === goalId ? { ...x, title } : x));
    try {
      await updateGoalTitle(goalId, title);
      showToast('Meta renombrada');
    } catch(e) {
      setGoals(prevGoals); // revert
      showToast('Error al renombrar.');
      console.error(e);
    }
  };

  const handleUnarchive = async (g) => {
    try {
      await unarchiveGoal(g.id);
      setArchivedGoals(prev => prev.filter(x => x.id !== g.id));
      setGoals(prev => [...prev, { ...g, archived_at:null }]);
      setActiveGoalId(g.id);
      setView('seg');
      setShowReminder(true);
      showToast(`Meta "${g.title}" restaurada`);
    } catch(e) { showToast('Error al restaurar.'); console.error(e); }
  };
  const confirmArchive = async () => {
    if (!archiveTarget) return;
    setArchiveBusy(true);
    try {
      await archiveGoal(archiveTarget.id);
      const remaining = goals.filter(g => g.id !== archiveTarget.id);
      setGoals(remaining);
      setArchivedLoaded(false); // force reload next time vista is opened
      if (archiveTarget.id === activeGoalId && remaining.length > 0) setActiveGoalId(remaining[0].id);
      showToast(`Meta "${archiveTarget.title}" archivada`);
      setArchiveTarget(null);
    } catch(e) { showToast('Error al archivar.'); console.error(e); }
    finally { setArchiveBusy(false); }
  };

  const handleLog = async ({ amount, note, existingId, replan, direct }) => {
    if (direct) {
      // quick log without opening modal
      setSaving(true);
      try {
        const month=currentMonthKey();
        const newId=await upsertContribution(user.id,goal.id,month,amount,note||'',existingId||null);
        setContributions(prev=>{
          const filtered=prev.filter(c=>c.month!==month);
          return [{id:newId,month,amount,note:note||''},...filtered].sort((a,b)=>b.month.localeCompare(a.month));
        });
        setShowReminder(false);
        showToast(`Aporte de ${fmtCOP(amount)} registrado`);
      } catch(e){ showToast('Error al guardar.'); } finally { setSaving(false); }
      return;
    }
    setShowLog(false);
    if (!amount && !note) { setShowLog(true); return; }
    setSaving(true);
    try {
      const month=currentMonthKey();
      const newId=await upsertContribution(user.id,goal.id,month,amount,note||'',existingId||null);
      setContributions(prev=>{
        const filtered=prev.filter(c=>c.month!==month);
        return [{id:newId,month,amount,note:note||''},...filtered].sort((a,b)=>b.month.localeCompare(a.month));
      });
      setShowReminder(false);
      if (replan){ setTimeout(()=>setShowReplan(true),250); }
      else showToast(`Aporte de ${fmtCOP(amount)} registrado`);
    } catch(e){ showToast('Error al guardar.'); console.error(e); } finally { setSaving(false); }
  };
  const handleApply = (opt)=>{
    setShowReplan(false);
    const labels={ monthly:'Aporte actualizado', extend:'Plazo extendido', lower:'Meta ajustada', none:'Plan sin cambios' };
    showToast(labels[opt]);
  };

  // Header copy per view
  const headerMap = {
    seg:     { sub:'Seguimiento de aportes', title: goal?.title||'Mis metas' },
    hist:    { sub:'Histórico', title:'Todas tus metas' },
    arch:    { sub:'Archivadas', title:'Metas archivadas' },
    news:    { sub:'Novedades', title:'Qué hay de nuevo' },

  };
  const header = headerMap[view]||headerMap.seg;

  // Loading / error screens
  const mainContent = () => {
    if (phase==='auth'||phase==='loading') return <Spinner text={phase==='auth'?'Verificando sesión…':'Cargando metas…'} />;
    if (phase==='error') return <ErrorState message={errorMsg} onRetry={()=>fetchGoals(user?.id)} />;
    if (view==='seg') return (
      <SegView goals={goals} activeGoalId={activeGoalId} onSelectGoal={id=>{setActiveGoalId(id);setShowReminder(true);}}
        contributions={contributions} tone={tone} gap={gap}
        showReminder={showReminder} saving={saving}
        onLog={()=>setShowLog(true)}
        onMarkPaid={()=>handleLog({ amount:goal?.monthly_add||0, note:'', existingId:null, replan:false, direct:true })}
        onOtherAmount={()=>{setShowReminder(false);setShowLog(true);}}
        onLater={()=>setShowReminder(false)}
        onReplan={()=>setShowReplan(true)}
        onArchive={handleArchive}
        onRename={handleRename}
        isMobile={isMobile}
      />
    );
    if (view==='hist')    return <ComingSoon icon="≡" title="Histórico" body="Todas tus metas en un timeline navegable: activas, completadas y archivadas." />;
    if (view==='arch')    return <ArchivedView goals={archivedGoals} loaded={archivedLoaded} onUnarchive={handleUnarchive} isMobile={isMobile} />;
    return null;
  };

  return (
    <div style={{ display:'flex', minHeight:'100svh', background:css('--bg') }}>
      {/* Sidebar — desktop + tablet */}
      {!isMobile && (
        <Sidebar active={view} onNav={handleNav}
          collapsed={sidebarCollapsed} onToggleCollapse={()=>setSidebarCollapsed(c=>!c)}
          theme={theme} onToggleTheme={toggleTheme} user={user}
          goals={goals.map(g => ({ id:g.id, title:g.title,
            tone: statusFromProjection(projectedValue(g), g.goal_amount) }))}
          activeGoalId={activeGoalId}
          onSelectGoal={id => { setActiveGoalId(id); setShowReminder(true); }} />
      )}

      {/* Main column */}
      <main style={{ flex:1, minWidth:0, display:'flex', flexDirection:'column' }}>
        {isMobile ? (
          <MobileTopBar title={header.title} subtitle={header.sub} />
        ) : (
          <ContextHeader title={header.title} subtitle={header.sub}
            theme={theme} onToggleTheme={toggleTheme}
            collapsed={sidebarCollapsed} compact={isTablet} />
        )}
        <div style={{ flex:1 }}>
          {mainContent()}
        </div>
      </main>

      {/* Mobile chrome */}
      {isMobile && (
        <>
          <BottomNav active={view} onNav={handleNav} />
          <MoreSheet open={moreOpen} onClose={()=>setMoreOpen(false)}
            theme={theme} onToggleTheme={toggleTheme} user={user}
            onWhatsNew={()=>setShowWhatsNew(true)} />
        </>
      )}

      {/* Modals */}
      {showLog && goal && (
        <LogContributionModal goal={goal} contributions={contributions} saving={saving}
          onClose={()=>setShowLog(false)} onSubmit={handleLog} />
      )}
      {showReplan && goal?.tracking_start_date && (
        <ReplanModal goal={goal} contributions={contributions}
          onClose={()=>setShowReplan(false)} onApply={handleApply} />
      )}

      <ToastBar message={toast} onDismiss={()=>setToast(null)} />
      {showWhatsNew && <WhatsNewModal onClose={()=>setShowWhatsNew(false)} />}
      {archiveTarget && (
        <ArchiveModal goal={archiveTarget} contribCount={archiveCount}
          busy={archiveBusy}
          onClose={()=>!archiveBusy && setArchiveTarget(null)}
          onConfirm={confirmArchive} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
